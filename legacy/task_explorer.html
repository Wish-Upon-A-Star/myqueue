        e.stopPropagation();
        updatePriority(id, e.target.value);
      });

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'btn-danger';
      del.textContent = '삭제';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTask(id);
      });

      const removeFromList = document.createElement('button');
      removeFromList.type = 'button';
      removeFromList.className = 'btn-secondary';
      removeFromList.textContent = '목록에서 제거';
      removeFromList.title = '현재 목록에서만 제거';
      removeFromList.addEventListener('click', (e) => {
        e.stopPropagation();
        if (currentViewMode !== 'pathList' || !currentPathListId) {
          window.alert('목록에서 볼 때만 사용 가능합니다.');
          return;
        }
        const activeList = getPathListById(currentPathListId);
        const pathName = activeList ? (activeList.title || '목록') : '목록';
        if (!window.confirm(`"${task.title || '이름 없음'}"을(를) ${pathName}에서 제거할까요?`)) return;
        removeTaskFromPathList(id, currentPathListId);
      });

        actions.appendChild(moveToAbove);
        actions.appendChild(starBtn);
        actions.appendChild(kindBtn);
        actions.appendChild(nextActionBtn);
        actions.appendChild(memoBtn);
        actions.appendChild(copyBtn);
        actions.appendChild(renameBtn);
        actions.appendChild(priorityField);
        actions.appendChild(todayWrap);
        if (currentViewMode === 'pathList') {
          actions.appendChild(removeFromList);
        }
        actions.appendChild(del);

      li.appendChild(left);
      li.appendChild(actions);

      li.addEventListener('contextmenu', (e) => {
        if (e.target.closest('.task-actions')) return;
        e.preventDefault();
        if (taskIsMemo) {
          setMemoTarget(id, true);
          return;
        }
        toggleComplete(id);
      });

      li.addEventListener('dragstart', (e) => {
        if (currentViewMode !== 'all') return;
        draggingSavedListId = null;
        draggingTaskId = id;
        li.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.dropEffect = 'move';
        e.dataTransfer.setData('text/plain', id);
      });

      li.addEventListener('dragend', () => {
        draggingTaskId = null;
        li.classList.remove('dragging');
        li.classList.remove('drag-before', 'drag-into');
        delete li.dataset.dropSide;
        document.querySelectorAll('.task-item').forEach((item) => {
          item.classList.remove('drag-before', 'drag-into');
          delete item.dataset.dropSide;
        });
        document.querySelectorAll('.custom-tab-item.dragging-target').forEach((item) => {
          item.classList.remove('dragging-target');
        });
      });

        li.addEventListener('dragover', (e) => {
        if (currentViewMode !== 'all') return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (!draggingTaskId || draggingTaskId === id) return;

        const rect = li.getBoundingClientRect();
        const isInto = e.clientY >= rect.top + rect.height / 2;
        li.classList.remove('drag-before', 'drag-into');
        if (isInto) {
          li.classList.add('drag-into');
          li.dataset.dropSide = 'into';
        } else {
          li.classList.add('drag-before');
          li.dataset.dropSide = 'before';
        }
      });

      li.addEventListener('dragleave', () => {
        if (currentViewMode !== 'all') return;
        li.classList.remove('drag-before', 'drag-into');
        delete li.dataset.dropSide;
      });

      li.addEventListener('drop', (e) => {
        if (currentViewMode !== 'all') return;
        e.preventDefault();
        const side = li.dataset.dropSide || 'before';
        const targetId = li.dataset.id;
        const dropParentId = li.dataset.parentId || currentParentId;
        li.classList.remove('drag-before', 'drag-into');
        delete li.dataset.dropSide;

        if (side === 'into') {
          moveTaskIntoTask(draggingTaskId, targetId);
        } else {
          moveTaskInSameParent(draggingTaskId, targetId, 'before', dropParentId);
        }
        draggingTaskId = null;
      });

      return li;
    }

    function createNextActions(taskId) {
      const rows = getNextActionRows(taskId, 3);
      if (!rows.length) return null;

      const wrap = document.createElement('div');
      wrap.className = 'next-actions';

      const title = document.createElement('div');
      title.className = 'next-actions-title';
      title.textContent = '다음 행동';
      wrap.appendChild(title);

      rows.forEach((row) => {
        const task = getTaskNode(row.id);
        if (!task) return;

        const item = document.createElement('div');
        item.className = 'next-action-row';

        const open = document.createElement('button');
        open.type = 'button';
        open.className = 'next-action-open';
        open.textContent = task.title || '이름 없음';
        open.title = getTaskPathLabel(row.id);
        open.addEventListener('click', () => {
          setCurrentParent(row.id);
          setMemoTarget(row.id, true);
        });

        const done = document.createElement('button');
        done.type = 'button';
        done.className = 'next-action-done';
        done.textContent = '완료';
        done.title = '이 다음 행동 완료';
        done.addEventListener('click', (event) => {
          event.stopPropagation();
          toggleComplete(row.id);
        });

        item.appendChild(open);
        item.appendChild(done);
        wrap.appendChild(item);
      });

      return wrap;
    }

    function createMatrixCard(title, rows, options = {}) {
      const card = document.createElement('section');
      card.className = `matrix-card${options.primary ? ' primary' : ''}${options.importantOnly ? ' important-only' : ''}${options.urgentOnly ? ' urgent-only' : ''}${options.quiet ? ' quiet' : ''}`;

      const head = document.createElement('div');
      head.className = 'matrix-head';

      const titleEl = document.createElement('div');
      titleEl.className = 'matrix-title';
      titleEl.textContent = title;

      const count = document.createElement('span');
      count.className = 'matrix-count';
      count.textContent = `${rows.length}개`;

      head.appendChild(titleEl);
      head.appendChild(count);
      card.appendChild(head);

      const list = document.createElement('ul');
      list.className = 'matrix-list';

      const visibleRows = options.limit && !matrixShowNeither ? rows.slice(0, options.limit) : rows;
      if (!visibleRows.length) {
        const empty = document.createElement('div');
        empty.className = 'matrix-empty';
        empty.textContent = '해당 작업이 없습니다.';
        card.appendChild(empty);
        return card;
      }

      visibleRows.forEach((row) => {
        const task = getTaskNode(row.id);
        if (!task) return;
        list.appendChild(createTaskItem(task, row.id, row.parentId));
        if (options.showNextActions) {
          const nextActions = createNextActions(row.id);
          if (nextActions) list.appendChild(nextActions);
        }
      });
      card.appendChild(list);

      if (options.limit && rows.length > options.limit) {
        const more = document.createElement('button');
        more.type = 'button';
        more.className = 'btn-secondary matrix-more';
        more.textContent = matrixShowNeither
          ? '둘 다 아닌 일 접기'
          : `둘 다 아닌 일 ${rows.length - options.limit}개 더 보기`;
        more.addEventListener('click', () => {
          matrixShowNeither = !matrixShowNeither;
          renderTasks();
        });
        card.appendChild(more);
      }

      return card;
    }

    function renderMatrixTasks() {
      taskList.style.display = 'none';
      matrixView.innerHTML = '';
      matrixView.classList.add('open');
      emptyState.style.display = 'none';

      const buckets = getMatrixRowsFrom(currentParentId);
      matrixView.appendChild(createMatrixCard('급하고 중요한 일', buckets.urgentImportant, { primary: true, showNextActions: true }));
      matrixView.appendChild(createMatrixCard('중요하지만 급하지 않은 일', buckets.importantOnly, { importantOnly: true, showNextActions: true }));
      matrixView.appendChild(createMatrixCard('급하지만 중요하지 않은 일', buckets.urgentOnly, { urgentOnly: true, showNextActions: true }));
      matrixView.appendChild(createMatrixCard('둘 다 아닌 일', buckets.neither, { quiet: true, limit: 20 }));
    }

    function renderTasks() {
      taskList.innerHTML = '';
      taskList.style.display = '';
      matrixView.innerHTML = '';
      matrixView.classList.remove('open');
      emptyState.style.display = 'none';

      if (currentViewMode === 'matrix') {
        renderMatrixTasks();
        return;
      }

      const visibleRows = getVisibleTaskRows();
      if (!visibleRows.length) {
      emptyState.textContent = currentViewMode === 'today'
        ? '오늘 할일로 지정된 작업이 없습니다.'
        : currentViewMode === 'important'
          ? '중요로 지정된 작업이 없습니다.'
          : currentViewMode === 'date'
            ? '해당 날짜에 작업이 없습니다.'
            : currentViewMode === 'completed-date'
              ? '해당 완료일에 작업이 없습니다.'
          : '작업이 없습니다.';
        emptyState.style.display = 'block';
        return;
      }

      visibleRows.forEach((row) => {
        const { id } = row;
        const task = getTaskNode(id);
        if (!task) return;

        const li = createTaskItem(task, id, currentParentId);
        taskList.appendChild(li);
      });
    }

    function getTaskPathLabel(taskId) {
      const nodes = getPathNodes(taskId);
      return nodes.map((node) => node.title).join(' > ');
    }

    function setMemoTarget(taskId, shouldFocus = false) {
      const target = getTaskNode(taskId);
      if (!target || target.id === ROOT_ID) {
        memoTargetTaskId = null;
      } else {
        memoTargetTaskId = taskId;
      }

      renderMemoPanel();

      if (shouldFocus && !memoPanelInput.disabled) {
        memoPanelInput.focus();
      }
    }

    function renderMemoPanel() {
      const target = memoTargetTaskId ? getTaskNode(memoTargetTaskId) : null;
      if (!target || target.id === ROOT_ID) {
        memoTargetTaskId = null;
        memoPanelTitle.textContent = '작업 메모';
        memoPanelTarget.textContent = '작업을 클릭하면 해당 작업 메모를 작성할 수 있습니다.';
        memoPanelInput.value = '';
        memoPanelInput.disabled = true;
        memoPanelEmpty.style.display = 'block';
        return;
      }

      memoPanelTitle.textContent = `${target.title} 메모`;
      memoPanelTarget.textContent = `현재 작업 디렉토리: ${getTaskPathLabel(target.id)}`;
      memoPanelInput.value = target.memo || '';
      memoPanelInput.disabled = false;
      memoPanelEmpty.style.display = 'none';
    }

    function render() {
      if (!getTaskNode(currentParentId)) currentParentId = ROOT_ID;
      document.body.classList.toggle('matrix-mode', currentViewMode === 'matrix');
      renderTabs();
      updateDateSectionUI();
      updateFolderSectionUI();
      updatePathSectionUI();
      renderCreatedDateList();
      renderCompletedDateList();
      renderCustomTabs();
      renderPathLists();
      renderBreadcrumb();
      syncAddFormDefaults();
      renderTasks();
      renderMemoPanel();
    }

    function init() {
      ensureNodeStructure();
      render();

      if (createdDateToggleBtn) {
        createdDateToggleBtn.addEventListener('click', () => {
          isDateSectionOpen = !isDateSectionOpen;
          updateDateSectionUI();
          if (isDateSectionOpen) {
            renderCreatedDateList();
          } else if (createdDateList) {
            createdDateList.innerHTML = '';
          }
        });
      }

      if (completedDateToggleBtn) {
        completedDateToggleBtn.addEventListener('click', () => {
          isCompletedDateSectionOpen = !isCompletedDateSectionOpen;
          updateDateSectionUI();
          if (isCompletedDateSectionOpen) {
            renderCompletedDateList();
          } else if (completedDateList) {
            completedDateList.innerHTML = '';
          }
        });
      }

      if (folderViewToggleBtn) {
        folderViewToggleBtn.addEventListener('click', () => {
          isFolderViewOpen = !isFolderViewOpen;
          if (isFolderViewOpen) {
            updateFolderSectionUI();
            renderCustomTabs();
          } else {
            if (customTabList) {
              customTabList.innerHTML = '';
            }
            updateFolderSectionUI();
          }
        });
      }

      if (pathViewToggleBtn) {
        pathViewToggleBtn.addEventListener('click', () => {
          isListViewOpen = !isListViewOpen;
          if (isListViewOpen) {
            updatePathSectionUI();
            renderPathLists();
          } else {
            if (pathListContainer) {
              pathListContainer.innerHTML = '';
            }
            updatePathSectionUI();
          }
        });
      }

      tabAll.addEventListener('click', () => {
        if (currentViewMode !== 'all') {
          currentViewMode = 'all';
          currentDateFilterKey = null;
          currentCompletedDateFilterKey = null;
          isDateSectionOpen = false;
          isCompletedDateSectionOpen = false;
          currentPathListId = null;
          currentParentId = ROOT_ID;
          matrixShowNeither = false;
          render();
        }
      });

      tabToday.addEventListener('click', () => {
        if (currentViewMode !== 'today') {
          currentViewMode = 'today';
          currentDateFilterKey = null;
          currentCompletedDateFilterKey = null;
          isDateSectionOpen = false;
          isCompletedDateSectionOpen = false;
          currentPathListId = null;
          currentParentId = ROOT_ID;
          matrixShowNeither = false;
          render();
        }
      });

      tabImportant.addEventListener('click', () => {
        if (currentViewMode !== 'important') {
          currentViewMode = 'important';
          currentDateFilterKey = null;
          currentCompletedDateFilterKey = null;
          isDateSectionOpen = false;
          isCompletedDateSectionOpen = false;
          currentPathListId = null;
          currentParentId = ROOT_ID;
          matrixShowNeither = false;
          render();
        }
      });

      tabMatrix.addEventListener('click', () => {
        if (currentViewMode !== 'matrix') {
          currentViewMode = 'matrix';
          currentDateFilterKey = null;
          currentCompletedDateFilterKey = null;
          isDateSectionOpen = false;
          isCompletedDateSectionOpen = false;
          currentPathListId = null;
          currentParentId = ROOT_ID;
          matrixShowNeither = false;
          render();
        }
      });

      kindFilterAllBtn.addEventListener('click', () => {
        currentKindFilter = 'all';
        render();
      });

      kindFilterTaskBtn.addEventListener('click', () => {
        currentKindFilter = 'task';
        render();
      });

      kindFilterMemoBtn.addEventListener('click', () => {
        currentKindFilter = 'memo';
        render();
      });

      addCustomTabBtn.addEventListener('click', () => {
        const title = sanitizeCustomTabName(customTabNameInput.value);
        createCustomTab(title);
        customTabNameInput.value = '';
        customTabNameInput.focus();
      });

      customTabNameInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          addCustomTabBtn.click();
        }
      });

      addPathListBtn.addEventListener('click', () => {
        const title = sanitizeCustomTabName(pathListNameInput.value);
        createPathList(title);
        pathListNameInput.value = '';
        pathListNameInput.focus();
      });

      pathListNameInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          addPathListBtn.click();
        }
      });

      if (taskKindInput) {
        taskKindInput.addEventListener('change', () => {
          const isMemo = taskKindInput.value === 'memo';
          taskPriorityInput.disabled = isMemo;
          taskTodayInput.disabled = isMemo;
          if (isMemo) {
            taskPriorityInput.value = '';
            taskTodayInput.checked = false;
          }
        });
      }

      saveStateBtn.addEventListener('click', () => {
        downloadStateFile();
      });

      if (memoizeCurrentTreeBtn) {
        memoizeCurrentTreeBtn.addEventListener('click', () => {
          if (currentParentId === ROOT_ID) {
            window.alert('루트 전체 메모화는 너무 위험합니다. 메모화할 큰 항목 안으로 들어간 뒤 실행하세요.');
            return;
          }

          const current = getTaskNode(currentParentId);
          const title = current ? current.title || '현재 항목' : '현재 항목';
          if (!window.confirm(`"${title}"와 그 하위 항목을 전부 메모화할까요?`)) return;
          updateNodeKind(currentParentId, 'memo');
        });
      }

      if (exportTreeBtn) {
        exportTreeBtn.addEventListener('click', () => {
          exportTaskTreeText();
        });
      }

        clearTodayBtn.addEventListener('click', () => {
          clearTodayInCurrentView();
        });

      loadStateBtn.addEventListener('click', () => {
        pickAndLoadStateFromFile();
      });

      importFileInput.addEventListener('change', (event) => {
        const files = event.target.files;
        if (!files || !files[0]) return;
        const reader = new FileReader();
        reader.onload = (readerEvent) => {
          const raw = readerEvent.target.result;
          loadStateFromFileObject(raw);
          importFileInput.value = '';
        };
        reader.readAsText(files[0], 'utf-8');
      });

      if (togglePasteTreeBtn && pasteTreeBox) {
        togglePasteTreeBtn.addEventListener('click', () => {
          const isOpen = pasteTreeBox.classList.toggle('open');
          togglePasteTreeBtn.textContent = isOpen ? '트리 붙여넣기 닫기' : '트리 붙여넣기';
          if (isOpen && pasteTreeInput) pasteTreeInput.focus();
        });
      }

      if (pasteTreeAddBtn && pasteTreeInput) {
        pasteTreeAddBtn.addEventListener('click', () => {
          const raw = pasteTreeInput.value || '';
          if (!raw.trim()) {
            pasteTreeInput.focus();
            return;
          }
          if (!importTaskTreeTextAsChildren(raw, { keepRoot: true })) {
            window.alert('붙여넣은 트리 구조를 읽을 수 없습니다.');
            return;
          }
          pasteTreeInput.value = '';
          if (pasteTreeBox) pasteTreeBox.classList.remove('open');
          if (togglePasteTreeBtn) togglePasteTreeBtn.textContent = '트리 붙여넣기';
          taskInput.focus();
        });
      }

      goRootBtn.addEventListener('click', () => {
        setCurrentParent(ROOT_ID);
      });

      taskList.addEventListener('dragover', (e) => {
        if (currentViewMode !== 'all') return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      taskList.addEventListener('drop', (e) => {
        if (currentViewMode !== 'all') return;
        e.preventDefault();
        if (!draggingTaskId) return;

        const li = e.target.closest('.task-item');
        if (!li) {
          moveTaskInSameParent(draggingTaskId, null, 'after');
          draggingTaskId = null;
          return;
        }

        const side = li.dataset.dropSide || 'before';
        const targetId = li.dataset.id;
        if (side === 'into') {
          moveTaskIntoTask(draggingTaskId, targetId);
        } else {
          moveTaskInSameParent(draggingTaskId, targetId, 'before');
        }
        draggingTaskId = null;

        document.querySelectorAll('.task-item').forEach((item) => {
          item.classList.remove('drag-before', 'drag-into');
          delete item.dataset.dropSide;
        });
      });

      customTabList.addEventListener('dragover', (e) => {
        if (currentViewMode !== 'all' || !draggingCustomTabId) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      customTabList.addEventListener('drop', (e) => {
        if (currentViewMode !== 'all' || !draggingCustomTabId) return;
        e.preventDefault();

        const visibleCustomTabs = Array.isArray(state.customTabs)
          ? [...state.customTabs].filter((tab) => {
            const node = getTaskNode(tab.id);
            return node && node.isCustomFolder && node.parentId === ROOT_ID;
          })
          : [];
        visibleCustomTabs.sort((a, b) => (a.createdOrder - b.createdOrder));

        const sourceIndex = visibleCustomTabs.findIndex((tab) => String(tab.id) === String(draggingCustomTabId));
        const targetIndex = visibleCustomTabs.length ? visibleCustomTabs.length - 1 : -1;

        if (sourceIndex !== -1 && targetIndex !== -1) {
          const sourceGlobalIndex = state.customTabs.findIndex((tab) => String(tab.id) === String(visibleCustomTabs[sourceIndex].id));
          const targetGlobalIndex = targetIndex >= 0 ? state.customTabs.findIndex((tab) => String(tab.id) === String(visibleCustomTabs[targetIndex].id)) : -1;
          if (sourceGlobalIndex !== -1 && targetGlobalIndex !== -1) {
            moveCustomTab(sourceGlobalIndex, targetGlobalIndex);
          }
        }

        draggingCustomTabId = null;
      });

      pathListContainer.addEventListener('dragover', (e) => {
        if (currentViewMode !== 'all' || !draggingSavedListId) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
      });

      pathListContainer.addEventListener('drop', (e) => {
        if (currentViewMode !== 'all' || !draggingSavedListId) return;
        e.preventDefault();

        const visiblePathLists = Array.isArray(state.pathLists)
          ? [...state.pathLists].sort((a, b) => (a.createdOrder - b.createdOrder))
          : [];
        const sourceIndex = visiblePathLists.findIndex((listItem) => String(listItem.id) === String(draggingSavedListId));
        const targetIndex = visiblePathLists.length ? visiblePathLists.length - 1 : -1;

        if (sourceIndex !== -1 && targetIndex !== -1) {
          const sourceGlobalIndex = state.pathLists.findIndex((listItem) => String(listItem.id) === String(visiblePathLists[sourceIndex].id));
          const targetGlobalIndex = targetIndex >= 0 ? state.pathLists.findIndex((listItem) => String(listItem.id) === String(visiblePathLists[targetIndex].id)) : -1;
          if (sourceGlobalIndex !== -1 && targetGlobalIndex !== -1) {
            movePathList(sourceGlobalIndex, targetGlobalIndex);
          }
        }

        draggingSavedListId = null;
      });

      memoPanelInput.addEventListener('input', () => {
        const target = getTaskNode(memoTargetTaskId);
        if (!target || target.id === ROOT_ID) return;

        target.memo = memoPanelInput.value || '';

        if (memoSaveTimer) {
          clearTimeout(memoSaveTimer);
        }
        memoSaveTimer = setTimeout(() => {
          memoSaveTimer = null;
          saveState();
        }, 200);
      });

      memoPanelInput.addEventListener('blur', () => {
        if (!memoTargetTaskId) return;
        const target = getTaskNode(memoTargetTaskId);
        if (!target || target.id === ROOT_ID) return;

        if (memoSaveTimer) {
          clearTimeout(memoSaveTimer);
          memoSaveTimer = null;
        }
        saveState();
      });

      addForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const title = sanitizeTaskTitle(taskInput.value);
        if (!title) return;

        const priority = parsePriority(taskPriorityInput.value);
        const isToday = taskTodayInput.checked;
        const kind = taskKindInput && taskKindInput.value === 'memo' ? 'memo' : 'task';

        addTask(title, priority, isToday, kind);
        taskInput.value = '';
        taskPriorityInput.value = '';
        taskTodayInput.checked = false;
        syncAddFormDefaults();
        taskInput.focus();
        });

        taskInput.focus();
        saveState();
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'hidden') flushSaveState();
        });
        window.addEventListener('beforeunload', flushSaveState);
    }

    init();
  </script>
</body>
</html>
