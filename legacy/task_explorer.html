            <p id="memo-target" class="memo-subtitle">작업을 선택하면 메모를 작성할 수 있습니다.</p>
            <textarea id="memo-input" class="memo-input" placeholder="선택한 작업 메모 입력" disabled></textarea>
            <p id="memo-empty" class="memo-empty">현재 작업이 선택되어야 메모를 입력할 수 있습니다.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'task-explorer-state-v1';
    const ROOT_ID = 'root';
    const SAVE_DEBOUNCE_MS = 120;
    const STATE_VERSION = 2;
    const CHILD_INDEX_VERSION = 1;

    let state = loadState();
    let currentParentId = ROOT_ID;
    let currentViewMode = 'all';
    let currentKindFilter = 'all';
    let draggingTaskId = null;
    let draggingCustomTabId = null;
    let draggingSavedListId = null;
    let memoTargetTaskId = null;
    let currentPathListId = null;
    let currentDateFilterKey = null;
    let currentCompletedDateFilterKey = null;
    let isDateSectionOpen = false;
    let isCompletedDateSectionOpen = false;
    let isFolderViewOpen = false;
    let isListViewOpen = false;
    let matrixShowNeither = false;
    let saveTimer = null;
    let memoSaveTimer = null;
    const childrenCache = new Map();

    const breadcrumb = document.getElementById('breadcrumb');
    const addContext = document.getElementById('add-context');
    const modeHint = document.getElementById('mode-hint');
    const addForm = document.getElementById('add-form');
    const taskInput = document.getElementById('task-input');
    const taskKindInput = document.getElementById('task-kind');
    const taskPriorityInput = document.getElementById('task-priority');
    const taskTodayInput = document.getElementById('task-today-toggle');
    const taskList = document.getElementById('task-list');
    const matrixView = document.getElementById('matrix-view');
    const emptyState = document.getElementById('empty-state');
    const createdDateList = document.getElementById('created-date-list');
    const createdDateToggleBtn = document.getElementById('toggle-created-date');
    const createdDateSection = document.getElementById('created-date-section');
    const completedDateList = document.getElementById('completed-date-list');
    const completedDateToggleBtn = document.getElementById('toggle-completed-date');
    const completedDateSection = document.getElementById('completed-date-section');
    const folderViewToggleBtn = document.getElementById('toggle-folder-view');
    const folderViewSection = document.getElementById('folder-view-section');
    const pathViewToggleBtn = document.getElementById('toggle-list-view');
    const pathViewSection = document.getElementById('path-view-section');
    const goRootBtn = document.getElementById('go-root');
    const saveStateBtn = document.getElementById('save-state');
    const loadStateBtn = document.getElementById('load-state');
    const memoizeCurrentTreeBtn = document.getElementById('memoize-current-tree');
    const exportTreeBtn = document.getElementById('export-tree');
    const importFileInput = document.getElementById('import-file');
    const pasteTreeBox = document.getElementById('paste-tree-box');
    const togglePasteTreeBtn = document.getElementById('toggle-paste-tree');
    const pasteTreeInput = document.getElementById('paste-tree-input');
    const pasteTreeAddBtn = document.getElementById('paste-tree-add');
    const tabAll = document.getElementById('tab-all');
    const tabToday = document.getElementById('tab-today');
    const tabImportant = document.getElementById('tab-important');
    const tabMatrix = document.getElementById('tab-matrix');
    const kindFilterAllBtn = document.getElementById('kind-filter-all');
    const kindFilterTaskBtn = document.getElementById('kind-filter-task');
    const kindFilterMemoBtn = document.getElementById('kind-filter-memo');
    const clearTodayBtn = document.getElementById('clear-today');
    const customTabNameInput = document.getElementById('custom-tab-name');
    const addCustomTabBtn = document.getElementById('add-custom-tab');
    const customTabList = document.getElementById('custom-tab-list');
    const pathListNameInput = document.getElementById('path-list-name');
    const addPathListBtn = document.getElementById('add-path-list');
    const pathListContainer = document.getElementById('path-list-list');
    const memoPanelTitle = document.getElementById('memo-title');
    const memoPanelTarget = document.getElementById('memo-target');
    const memoPanelInput = document.getElementById('memo-input');
    const memoPanelEmpty = document.getElementById('memo-empty');
    const DATA_FILE_NAME = 'task-explorer-state.json';
    const TASK_TREE_EXPORT_NAME = 'task-tree.txt';

    function uid(prefix = 't') {
      return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function sanitizeTaskTitle(v) {
      return (v || '').trim();
    }

    function parsePriority(v) {
      const text = (v || '').toString().trim();
      if (!text) return null;
      const parsed = Number(text);
      if (Number.isNaN(parsed) || !Number.isFinite(parsed)) return null;
      return parsed;
    }

    function sanitizeCustomTabName(v) {
      return sanitizeTaskTitle(v);
    }

    function getNowIsoString() {
      return new Date().toISOString();
    }

    function formatDateKey(raw) {
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return '';
      const year = date.getFullYear();
      const month = `${date.getMonth() + 1}`.padStart(2, '0');
      const day = `${date.getDate()}`.padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function formatDateLabel(raw) {
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleDateString('ko-KR', {
        year: 'numeric',
        month: 'short',
        day: '2-digit'
      });
    }

    function formatCreatedAt(raw) {
      if (!raw) return '';
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return '';
      return date.toLocaleString('ko-KR', {
        year: '2-digit',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function dedupeCustomTabs(tabs) {
      const seen = new Set();
      const out = [];
      for (let i = 0; i < tabs.length; i += 1) {
        const tab = tabs[i];
        if (!tab || !tab.id) continue;
        const id = String(tab.id);
        if (seen.has(id)) continue;
        seen.add(id);
        out.push({
          id,
          title: sanitizeCustomTabName(tab.title) || `폴더 ${out.length + 1}`,
          createdOrder: Number.isFinite(tab.createdOrder) ? tab.createdOrder : i
        });
      }
      return out;
    }

    function dedupePathLists(lists) {
      const seen = new Set();
      const out = [];
      for (let i = 0; i < lists.length; i += 1) {
        const list = lists[i];
        if (!list || !list.id) continue;
        const id = String(list.id);
        if (seen.has(id)) continue;
        seen.add(id);
        const rawTasks = Array.isArray(list.taskIds) ? list.taskIds : [];
        const taskIds = [];
        const taskSet = new Set();
        for (let j = 0; j < rawTasks.length; j += 1) {
          const taskId = String(rawTasks[j]);
          if (taskSet.has(taskId)) continue;
          taskSet.add(taskId);
          taskIds.push(taskId);
        }

        out.push({
          id,
          title: sanitizeCustomTabName(list.title) || `목록 ${out.length + 1}`,
          createdOrder: Number.isFinite(list.createdOrder) ? list.createdOrder : i,
          taskIds
        });
      }
      return out;
    }

    function safeGetNode(id) {
      return state && state.nodes ? state.nodes[id] || null : null;
    }

    function normalizeChildrenIndexList(parentId, raw) {
      const parent = safeGetNode(parentId);
      if (!parent) return [];

      const rawChildren = Array.isArray(raw) ? raw : [];
      const seen = new Set();
      const normalized = [];
      const parentIdText = String(parent.id);

      for (let i = 0; i < rawChildren.length; i += 1) {
        const childId = String(rawChildren[i]);
        const child = safeGetNode(childId);
        if (!child) continue;
        if (child.id === parentIdText) continue;
        if (String(child.parentId) !== parentIdText) continue;
        if (seen.has(childId)) continue;
        seen.add(childId);
        normalized.push(childId);
      }

      return normalized;
    }

    function normalizeChildrenCacheForParent(parentId) {
      const parent = safeGetNode(parentId);
      if (!parent) {
        childrenCache.delete(String(parentId));
        return;
      }

      const id = String(parent.id);
      const seen = new Set();
      const deduped = [];
      const rawChildren = Array.isArray(parent.children) ? parent.children : [];

      for (let i = 0; i < rawChildren.length; i += 1) {
        const childId = String(rawChildren[i]);
        const child = safeGetNode(childId);
        if (!child) continue;
        if (child.id === id) continue;
        if (String(child.parentId) !== id) continue;
        if (seen.has(childId)) continue;
        seen.add(childId);
        deduped.push(childId);
      }

      parent.children = deduped;
      if (!state.childrenIndex || typeof state.childrenIndex !== 'object') {
        state.childrenIndex = { version: CHILD_INDEX_VERSION, index: {} };
      } else if (!state.childrenIndex.index || typeof state.childrenIndex.index !== 'object') {
        state.childrenIndex.index = {};
      }
      state.childrenIndex.index[parent.id] = deduped.slice();
      childrenCache.set(id, deduped.slice());
    }

    function rebuildChildrenCache(parentId = null) {
      if (!state || !state.nodes) {
        childrenCache.clear();
        return;
      }

      if (parentId == null) {
        childrenCache.clear();
        const ids = Object.keys(state.nodes);
        for (let i = 0; i < ids.length; i += 1) {
          normalizeChildrenCacheForParent(ids[i]);
        }
        return;
      }

      normalizeChildrenCacheForParent(parentId);
    }

    function loadChildrenIndexFromState() {
      const source = state && state.childrenIndex;
      if (!source || typeof source !== 'object') return false;
      if (source.version !== undefined && source.version !== CHILD_INDEX_VERSION) return false;
      const index = source.index;
      if (!index || typeof index !== 'object') return false;
      const hasIndexEntries = Object.keys(index).length > 0;

      const parentIds = Object.keys(state.nodes || {});
      if (!parentIds.length) {
        childrenCache.clear();
        state.childrenIndex = {
          version: CHILD_INDEX_VERSION,
          index: {}
        };
        return true;
      }

      let total = 0;
      let loadedAny = false;

      childrenCache.clear();
      for (let i = 0; i < parentIds.length; i += 1) {
        const parentId = parentIds[i];
        const parent = safeGetNode(parentId);
        if (!parent) continue;
        const raw = index[parentId];
        if (!Array.isArray(raw)) continue;
        const normalized = normalizeChildrenIndexList(parentId, raw);
        parent.children = normalized;
        childrenCache.set(parent.id, normalized.slice());
        loadedAny = true;
        total += normalized.length;
      }

      for (let i = 0; i < parentIds.length; i += 1) {
        const parentId = parentIds[i];
        if (!childrenCache.has(parentId)) {
          normalizeChildrenCacheForParent(parentId);
          loadedAny = true;
        }
      }

      const normalizedIndex = {};
      if (state.childrenIndex && typeof state.childrenIndex === 'object' && state.childrenIndex.index) {
        Object.keys(state.childrenIndex.index).forEach((k) => {
          normalizedIndex[k] = normalizeChildrenIndexList(k, state.childrenIndex.index[k]);
        });
      }
      state.childrenIndex = {
        version: CHILD_INDEX_VERSION,
        index: normalizedIndex
      };

      return loadedAny || total > 0 || hasIndexEntries;
    }

    function normalizeAndIndexChildren() {
      if (!state || !state.nodes) return;

      const ids = Object.keys(state.nodes);
      const childrenByParent = {};
      const nextIndex = {};

      for (let i = 0; i < ids.length; i += 1) {
        const node = state.nodes[ids[i]];
        if (!node || node.id === ROOT_ID) continue;
        const pid = String(node.parentId || ROOT_ID);
        if (!state.nodes[pid] || pid === node.id) {
          node.parentId = ROOT_ID;
          if (!childrenByParent[ROOT_ID]) childrenByParent[ROOT_ID] = [];
          childrenByParent[ROOT_ID].push(node.id);
          continue;
        }
        node.parentId = pid;
        if (!childrenByParent[pid]) childrenByParent[pid] = [];
        childrenByParent[pid].push(node.id);
      }

      for (let i = 0; i < ids.length; i += 1) {
        const parentId = ids[i];
        const parent = state.nodes[parentId];
        if (!parent) continue;
        const known = childrenByParent[parentId] || [];
        const seen = new Set();
        const nextChildren = [];
        const existing = Array.isArray(parent.children) ? parent.children : [];

        for (let j = 0; j < existing.length; j += 1) {
          const childId = String(existing[j]);
          const child = state.nodes[childId];
          if (!child) continue;
          if (child.id === parentId) continue;
          if (String(child.parentId) !== parentId) continue;
          if (seen.has(childId)) continue;
          seen.add(childId);
          nextChildren.push(childId);
        }

        for (let j = 0; j < known.length; j += 1) {
          const childId = known[j];
          const child = state.nodes[childId];
          if (!child) continue;
          if (child.id === parentId) continue;
          if (String(child.parentId) !== parentId) continue;
          if (seen.has(childId)) continue;
          seen.add(childId);
          nextChildren.push(childId);
        }

        parent.children = nextChildren;
        nextIndex[parent.id] = nextChildren.slice();
      }

      childrenCache.clear();
      const uniqueParentIds = Object.keys(state.nodes);
      for (let i = 0; i < uniqueParentIds.length; i += 1) {
        const parentId = uniqueParentIds[i];
        const parent = safeGetNode(parentId);
        if (parent) {
          normalizeChildrenCacheForParent(parent.id);
        }
      }
      state.childrenIndex = {
        version: CHILD_INDEX_VERSION,
        index: nextIndex
      };
    }

    function removeCustomTabFromRegistry(tabId) {
      if (!Array.isArray(state.customTabs)) return;
      const id = String(tabId || '');
      if (!id) return;
      state.customTabs = state.customTabs.filter((tab) => String(tab.id) !== id);
    }

    function createCustomTab(name) {
      const title = sanitizeCustomTabName(name);
      if (!title) return;

      const id = uid('folder');
      const createdOrder = state.nextOrder;
      state.nextOrder += 1;

      state.customTabs.push({
        id,
        title,
        createdOrder
      });
      state.customTabs = dedupeCustomTabs(state.customTabs);
      const root = getTaskNode(ROOT_ID);
      if (root && !root.children.includes(id)) {
        root.children.push(id);
      }

        state.nodes[id] = {
          id,
          title,
          parentId: ROOT_ID,
          completed: false,
          isToday: false,
          isImportant: false,
          memo: '',
          priority: null,
          completedAt: null,
          createdOrder,
          createdAt: getNowIsoString(),
          children: [],
          isCustomFolder: true
        };

      rebuildChildrenCache(ROOT_ID);
      saveState();
      render();
    }

    function createPathList(name) {
      const title = sanitizeCustomTabName(name);
      if (!title) return;

      const createdOrder = state.nextOrder;
      state.nextOrder += 1;

      state.pathLists.push({
        id: uid('list'),
        title,
        createdOrder,
        taskIds: []
      });
      state.pathLists = dedupePathLists(state.pathLists);
      saveState();
      render();
    }

    function getPathListById(pathListId) {
      if (!Array.isArray(state.pathLists)) return null;
      const id = String(pathListId);
      for (let i = 0; i < state.pathLists.length; i += 1) {
        if (String(state.pathLists[i].id) === id) {
          return state.pathLists[i];
        }
      }
      return null;
    }

    function addTaskToPathList(taskId, pathListId) {
      const node = getTaskNode(taskId);
      const pathList = getPathListById(pathListId);
      if (!node || !pathList) return;
      if (node.isCustomFolder) {
        return;
      }
      if (!Array.isArray(pathList.taskIds)) pathList.taskIds = [];
      const normalizedTaskId = String(taskId);
      for (let i = 0; i < pathList.taskIds.length; i += 1) {
        if (String(pathList.taskIds[i]) === normalizedTaskId) return;
      }
      pathList.taskIds.push(normalizedTaskId);
      saveState();
      if (currentViewMode === 'pathList' && currentPathListId === pathList.id) {
        render();
      }
    }

    function removeTaskFromPathList(taskId, pathListId) {
      const pathList = getPathListById(pathListId);
      if (!pathList || !Array.isArray(pathList.taskIds)) return;
      const normalizedTaskId = String(taskId);
      const before = pathList.taskIds.length;
      pathList.taskIds = pathList.taskIds.filter((id) => String(id) !== normalizedTaskId);
      if (before === pathList.taskIds.length) return;
      saveState();
      if (currentViewMode === 'pathList' && String(currentPathListId) === String(pathList.id)) {
        render();
      }
    }

    function removeTaskFromPathLists(taskId) {
      if (!Array.isArray(state.pathLists) || !taskId) return;
      for (let i = 0; i < state.pathLists.length; i += 1) {
        const pathList = state.pathLists[i];
        if (!Array.isArray(pathList.taskIds)) continue;
        pathList.taskIds = pathList.taskIds.filter((id) => String(id) !== String(taskId));
      }
      state.pathLists = dedupePathLists(state.pathLists);
    }

    function openPathList(pathListId) {
      if (!getPathListById(pathListId)) return;
      currentViewMode = 'pathList';
      currentDateFilterKey = null;
      isDateSectionOpen = false;
      currentPathListId = pathListId;
      currentParentId = ROOT_ID;
      render();
    }

    function movePathList(fromIndex, toIndex) {
      if (!Number.isFinite(fromIndex) || !Number.isFinite(toIndex) || !Array.isArray(state.pathLists)) return;
      const normalizedFrom = Math.max(0, Math.min(state.pathLists.length - 1, fromIndex));
      const normalizedTo = Math.max(0, Math.min(state.pathLists.length - 1, toIndex));
      if (normalizedFrom === normalizedTo) return;
      const moved = state.pathLists.splice(normalizedFrom, 1)[0];
      state.pathLists.splice(normalizedTo, 0, moved);
      for (let i = 0; i < state.pathLists.length; i += 1) {
        if (state.pathLists[i]) {
          state.pathLists[i].createdOrder = i;
        }
      }
      saveState();
      render();
    }

    function moveCustomTab(fromIndex, toIndex) {
      if (!Number.isFinite(fromIndex) || !Number.isFinite(toIndex) || !Array.isArray(state.customTabs)) return;
      const normalizedFrom = Math.max(0, Math.min(state.customTabs.length - 1, fromIndex));
      const normalizedTo = Math.max(0, Math.min(state.customTabs.length - 1, toIndex));
      if (normalizedFrom === normalizedTo) return;

      const moved = state.customTabs.splice(normalizedFrom, 1)[0];
      state.customTabs.splice(normalizedTo, 0, moved);

      for (let i = 0; i < state.customTabs.length; i += 1) {
        if (state.customTabs[i]) {
          state.customTabs[i].createdOrder = i;
        }
      }
      state.customTabs = dedupeCustomTabs(state.customTabs);

      saveState();
      render();
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return null;
      try {
        return JSON.parse(saved);
      } catch (_) {
        return null;
      }
    }

    function ensureNodeStructure() {
      if (!state || !state.nodes || !state.nodes[ROOT_ID]) {
        state = {
          nextOrder: 1,
          nodes: {
            [ROOT_ID]: {
              id: ROOT_ID,
              title: '루트',
              parentId: null,
              completed: false,
              isToday: false,
              isImportant: false,
              kind: 'task',
              priority: null,
              completedAt: null,
              createdOrder: 0,
              children: []
            }
          }
        };
      }

      if (!Number.isFinite(state.nextOrder)) {
        state.nextOrder = 1;
      }

      if (!Array.isArray(state.customTabs)) state.customTabs = [];
      state.customTabs = dedupeCustomTabs(state.customTabs);

      if (!Array.isArray(state.pathLists)) state.pathLists = [];
      state.pathLists = dedupePathLists(state.pathLists);

      for (let i = 0; i < state.customTabs.length; i += 1) {
        const tab = state.customTabs[i];
        if (!state.nodes[tab.id]) {
          state.nodes[tab.id] = {
            id: tab.id,
            title: tab.title,
            parentId: ROOT_ID,
            completed: false,
            isToday: false,
            isImportant: false,
            kind: 'task',
            memo: '',
            priority: null,
            createdOrder: tab.createdOrder,
            createdAt: tab.createdAt || getNowIsoString(),
            completedAt: null,
            children: [],
            isCustomFolder: true
          };
        } else {
          state.nodes[tab.id].isCustomFolder = true;
          state.nodes[tab.id].title = tab.title;
          if (!Array.isArray(state.nodes[tab.id].children)) state.nodes[tab.id].children = [];
          state.nodes[tab.id].parentId = ROOT_ID;
          state.nodes[tab.id].completed = false;
          state.nodes[tab.id].isToday = false;
        }
      }

      const ids = Object.keys(state.nodes);
      for (let i = 0; i < ids.length; i += 1) {
        const node = state.nodes[ids[i]];
        if (!node || typeof node !== 'object') {
          delete state.nodes[ids[i]];
          continue;
        }

        if (!node.id) node.id = ids[i];
        node.id = String(node.id);

        if (!Array.isArray(node.children)) node.children = [];
      if (typeof node.completed !== 'boolean') node.completed = false;
      if (typeof node.isToday !== 'boolean') node.isToday = false;
      if (!Object.prototype.hasOwnProperty.call(node, 'isImportant')) node.isImportant = false;
      if (!Object.prototype.hasOwnProperty.call(node, 'memo') || typeof node.memo !== 'string') node.memo = '';
      if (!Object.prototype.hasOwnProperty.call(node, 'priority')) node.priority = null;
          if (!Object.prototype.hasOwnProperty.call(node, 'isCustomFolder')) node.isCustomFolder = false;
      if (node.isCustomFolder || node.id === ROOT_ID) {
        node.kind = 'task';
      } else if (node.kind !== 'memo' && node.kind !== 'task') {
        node.kind = 'task';
      }
      if (node.kind === 'memo') {
        node.completed = false;
        node.completedAt = null;
        node.isToday = false;
        node.isImportant = false;
      }
      if (!Object.prototype.hasOwnProperty.call(node, 'createdAt') || Number.isNaN(new Date(node.createdAt).getTime())) {
        node.createdAt = getNowIsoString();
      }
      if (!Object.prototype.hasOwnProperty.call(node, 'completedAt') || (node.completed && Number.isNaN(new Date(node.completedAt).getTime()))) {
        node.completedAt = node.completed ? getNowIsoString() : null;
      }
      if (!Number.isFinite(node.createdOrder)) {
        node.createdOrder = state.nextOrder;
        state.nextOrder += 1;
        }
      }

      if (!state.nodes[ROOT_ID]) {
      state.nodes[ROOT_ID] = {
          id: ROOT_ID,
          title: '루트',
          parentId: null,
          completed: false,
          isToday: false,
          isImportant: false,
          kind: 'task',
          memo: '',
          priority: null,
          completedAt: null,
          createdAt: getNowIsoString(),
          createdOrder: 0,
          children: []
        };
      } else {
        state.nodes[ROOT_ID].parentId = null;
        state.nodes[ROOT_ID].isToday = false;
        state.nodes[ROOT_ID].isImportant = false;
        state.nodes[ROOT_ID].kind = 'task';
        state.nodes[ROOT_ID].priority = null;
        state.nodes[ROOT_ID].completed = false;
        state.nodes[ROOT_ID].completedAt = null;
        if (!Object.prototype.hasOwnProperty.call(state.nodes[ROOT_ID], 'createdAt') || Number.isNaN(new Date(state.nodes[ROOT_ID].createdAt).getTime())) {
          state.nodes[ROOT_ID].createdAt = getNowIsoString();
        }
        if (!Array.isArray(state.nodes[ROOT_ID].children)) {
          state.nodes[ROOT_ID].children = [];
        }
      }

      if (Array.isArray(state.pathLists)) {
        state.pathLists.forEach((pathList) => {
          if (!pathList || !pathList.id) return;
          if (!Array.isArray(pathList.taskIds)) {
            pathList.taskIds = [];
          } else {
            const dedup = [];
            const seen = new Set();
            for (let i = 0; i < pathList.taskIds.length; i += 1) {
              const taskId = String(pathList.taskIds[i]);
              if (!state.nodes[taskId]) continue;
              if (seen.has(taskId)) continue;
              seen.add(taskId);
              dedup.push(taskId);
            }
            pathList.taskIds = dedup;
          }

          if (!Number.isFinite(pathList.createdOrder)) {
            pathList.createdOrder = state.nextOrder;
            state.nextOrder += 1;
          }
        });
        state.pathLists = dedupePathLists(state.pathLists);
      }

      const validIds = new Set(Object.keys(state.nodes));
      const referenced = new Set();

      Object.values(state.nodes).forEach((node) => {
        if (node.id === ROOT_ID) return;
        if (typeof node.parentId !== 'string' || !validIds.has(node.parentId)) {
          node.parentId = ROOT_ID;
        }
        node.children = node.children.filter((childId) => validIds.has(childId));
      });

      Object.values(state.nodes).forEach((node) => {
        if (!Array.isArray(node.children)) node.children = [];
        node.children.forEach((childId) => {
          const child = state.nodes[childId];
          if (child) {
            child.parentId = node.id;
            referenced.add(childId);
          }
        });
      });

      Object.values(state.nodes).forEach((node) => {
        if (node.id === ROOT_ID) return;
        if (!referenced.has(node.id) && node.parentId === ROOT_ID) {
          // keep as top-level
        }
      });

      const root = getTaskNode(ROOT_ID);
      if (root) {
        const cleaned = [];
        for (let i = 0; i < root.children.length; i += 1) {
          const childId = root.children[i];
          if (!state.nodes[childId]) continue;
          if (!cleaned.includes(childId)) cleaned.push(childId);
        }
        root.children = cleaned;

        const rootCustomIds = new Set();
        Object.values(state.nodes).forEach((node) => {
          if (node.id === ROOT_ID) return;
          if (node.isCustomFolder && node.parentId === ROOT_ID) {
            rootCustomIds.add(node.id);
          }
        });

        if (Array.isArray(state.customTabs)) {
          const existing = new Map();
          state.customTabs.forEach((tab) => {
            if (tab && tab.id) existing.set(String(tab.id), tab);
          });

          const merged = [];
          rootCustomIds.forEach((id) => {
            if (existing.has(id)) {
              const tab = existing.get(id);
              merged.push({
                id,
                title: sanitizeCustomTabName(tab.title) || state.nodes[id].title || '폴더',
                createdOrder: Number.isFinite(tab.createdOrder) ? tab.createdOrder : (state.nodes[id].createdOrder || 0)
              });
            } else {
              merged.push({
                id,
                title: state.nodes[id].title || '폴더',
                createdOrder: state.nodes[id].createdOrder || 0
              });
            }
          });

          root.children.forEach((childId) => {
            const node = state.nodes[childId];
            if (node && node.isCustomFolder && node.parentId === ROOT_ID && !rootCustomIds.has(childId)) {
              const maybe = existing.get(childId);
              if (maybe) {
                merged.push({
                  id: childId,
                  title: sanitizeCustomTabName(maybe.title) || node.title || '폴더',
                  createdOrder: Number.isFinite(maybe.createdOrder) ? maybe.createdOrder : (node.createdOrder || 0)
                });
              }
            }
          });

          state.customTabs = dedupeCustomTabs(merged);
        } else {
          state.customTabs = [];
        }
      }

      if (!Array.isArray(state.customTabs)) state.customTabs = [];
      state.customTabs = dedupeCustomTabs(state.customTabs).filter((tab) => state.nodes[tab.id]);

      state.schemaVersion = STATE_VERSION;
      if (!loadChildrenIndexFromState()) {
        normalizeAndIndexChildren();
      }
    }

    function saveState() {
      if (saveTimer) {
        clearTimeout(saveTimer);
      }

      saveTimer = setTimeout(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        saveTimer = null;
      }, SAVE_DEBOUNCE_MS);
    }

    function flushSaveState() {
      if (!saveTimer) return;
      clearTimeout(saveTimer);
      saveTimer = null;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    async function downloadStateFile() {
      const payload = JSON.stringify(state, null, 2);
      const isFileSaverAvailable = typeof window.showSaveFilePicker === 'function';

      if (isFileSaverAvailable) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: DATA_FILE_NAME,
            types: [
              {
                description: 'JSON',
                accept: { 'application/json': ['.json'] }
              }
            ]
          });
          const writable = await handle.createWritable();
          await writable.write(payload);
          await writable.close();
          return;
        } catch (error) {
          if (error && error.name === 'AbortError') return;
          // fallback
        }
      }

      const blob = new Blob([payload], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = DATA_FILE_NAME;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    function parseTaskTreeText(raw, options = {}) {
      if (!raw) return [];
      const lines = String(raw).replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
      const parsedItems = [];
      const keepRoot = Boolean(options.keepRoot);

      const parseTreeDepth = (prefix) => {
        if (!prefix) return 0;
        const normalized = prefix.replace(/\t/g, '    ');
        let depth = 0;
        let cursor = 0;
        while (cursor + 3 < normalized.length) {
          if (normalized.startsWith('│   ', cursor) || normalized.startsWith('    ', cursor)) {
            depth += 1;
            cursor += 4;
            continue;
          }
          break;
        }
        return depth;
      };

      const addItem = (title, depth) => {
        const trimmed = sanitizeTaskTitle(title);
        if (!trimmed) return;
        parsedItems.push({ title: trimmed, depth });
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        const trimmedLine = String(line).trimEnd();
        if (!trimmedLine.trim()) continue;

        if (trimmedLine.includes('루트의 하위 작업이 없습니다.')) continue;

        const treeConnectorMatch = trimmedLine.match(/^(?<prefix>[\s│]*)(?<connector>├──|└──)\s+(?<title>.*)$/);
        if (treeConnectorMatch) {
          const prefix = treeConnectorMatch.groups.prefix || '';
          const title = treeConnectorMatch.groups.title || '';
          addItem(title, parseTreeDepth(prefix) + 1);
          continue;
        }

        const bulletMatch = trimmedLine.match(/^(?<indent>[ \t]*)[-*+]\s+(?<title>.+)$/);
        if (bulletMatch) {
          const indent = (bulletMatch.groups.indent || '').replace(/\t/g, '    ');
          addItem(bulletMatch.groups.title || '', Math.max(0, Math.floor(indent.length / 2)));
          continue;
        }

        if (trimmedLine.trim()) {
          addItem(trimmedLine, 0);
        }
      }

      if (!parsedItems.length) return [];

      if (!keepRoot && parsedItems.length > 1 && parsedItems[0].depth === 0) {
        const restMinDepth = parsedItems.slice(1).reduce((acc, item) => Math.min(acc, item.depth), Number.MAX_VALUE);
        if (restMinDepth > 0) {
          return parsedItems.slice(1).map((item) => ({ title: item.title, depth: item.depth - 1 }));
        }
      }

      return parsedItems;
    }

    function importTaskTreeTextAsChildren(raw, options = {}) {
      const items = parseTaskTreeText(raw, options);
      if (!items.length) return false;

      const targetParent = getTaskNode(currentParentId) ? currentParentId : ROOT_ID;
      const parentByDepth = [];
      const createdIds = [];

      for (let i = 0; i < items.length; i += 1) {
        const item = items[i];
        const depth = Number.isFinite(item.depth) ? item.depth : 0;
        const parentDepth = depth - 1;
        const normalizedParentDepth = Math.max(-1, parentDepth);

        const parentId = normalizedParentDepth >= 0
          ? parentByDepth[normalizedParentDepth] || targetParent
          : targetParent;
        const parent = getTaskNode(parentId);
        if (!parent) continue;

        const id = uid('task');
        const createdOrder = state.nextOrder;
        state.nextOrder += 1;
        const node = {
          id,
          title: item.title,
          parentId: parent.id,
          completed: false,
          isToday: false,
          isImportant: false,
          kind: 'task',
          memo: '',
          priority: null,
          createdAt: getNowIsoString(),
          createdOrder,
          completedAt: null,
          children: [],
          isCustomFolder: false
        };

        state.nodes[id] = node;
        parent.children.push(id);
        parentByDepth[depth] = id;
        if (parentByDepth.length > depth + 1) {
          parentByDepth.length = depth + 1;
        }
        createdIds.push(id);
      }

      if (!createdIds.length) return false;

      rebuildChildrenCache(targetParent);
      saveState();
      if (!getTaskNode(currentParentId)) currentParentId = ROOT_ID;
      render();
      return true;
    }

    function loadStateFromFileObject(raw) {
      const asText = String(raw || '');
      try {
        const parsed = JSON.parse(asText);
        if (!parsed || typeof parsed !== 'object' || !parsed.nodes) {
          throw new Error('NOT_JSON_STATE');
        }
        state = parsed;
        if (!state.nextOrder) state.nextOrder = 1;
        ensureNodeStructure();
        saveState();
        if (!getTaskNode(currentParentId)) currentParentId = ROOT_ID;
        render();
        return;
      } catch (_) {}

      if (importTaskTreeTextAsChildren(asText)) {
        return;
      }

      alert('작업 파일을 읽을 수 없습니다.');
    }

    async function pickAndLoadStateFromFile() {
      if (typeof window.showOpenFilePicker === 'function') {
        try {
          const [handle] = await window.showOpenFilePicker({
            multiple: false,
            types: [
              { description: 'JSON', accept: { 'application/json': ['.json'], 'text/plain': ['.txt'] } },
              { description: '텍스트', accept: { 'text/plain': ['.txt'] } }
            ]
          });
          const file = await handle.getFile();
          const raw = await file.text();
          loadStateFromFileObject(raw);
          return;
        } catch (error) {
          if (error && error.name === 'AbortError') return;
          importFileInput.click();
          return;
        }
      }
      importFileInput.click();
    }

    function getTaskNode(id) {
      return state.nodes[id] || null;
    }

    function getNodeKind(node) {
      return node && node.kind === 'memo' ? 'memo' : 'task';
    }

    function isMemoNode(node) {
      return getNodeKind(node) === 'memo';
    }

    function getPriorityValue(task) {
      return Number.isFinite(task && task.priority) ? task.priority : Infinity;
    }

    function sortTaskRowsByPriority(rows) {
      return rows.slice().sort((a, b) => {
        const taskA = getTaskNode(a.id);
        const taskB = getTaskNode(b.id);
        const priorityA = getPriorityValue(taskA);
        const priorityB = getPriorityValue(taskB);
        if (priorityA !== priorityB) return priorityA - priorityB;
        const orderA = Number.isFinite(taskA && taskA.createdOrder) ? taskA.createdOrder : Infinity;
        const orderB = Number.isFinite(taskB && taskB.createdOrder) ? taskB.createdOrder : Infinity;
        return orderA - orderB;
      });
    }

    function enforceCompletedBoundary(ids) {
      const active = [];
      const completed = [];
      for (let i = 0; i < ids.length; i += 1) {
        const node = getTaskNode(ids[i]);
        if (!node) continue;
        if (node.completed) completed.push(ids[i]);
        else active.push(ids[i]);
      }
      return active.concat(completed);
    }

    function getPathNodes(targetId) {
      const nodes = [];
      let current = getTaskNode(targetId) || getTaskNode(ROOT_ID);
      while (current) {
        nodes.push(current);
        current = getTaskNode(current.parentId);
      }
      return nodes.reverse();
    }

    function getChildrenFromParent(parentId) {
      const parent = getTaskNode(parentId);
      if (!parent) return [];

      if (!childrenCache.has(parent.id)) {
        normalizeChildrenCacheForParent(parent.id);
      }
      const children = childrenCache.get(parent.id) || [];

      if (parent.id !== ROOT_ID) return children.slice();

      const visible = [];
      for (let i = 0; i < children.length; i += 1) {
        const child = getTaskNode(children[i]);
        if (child && !child.isCustomFolder) visible.push(children[i]);
      }
      return visible;
    }

    function getTodayTaskIdsFrom(parentId) {
      const result = [];
      const seen = new Set();

      function walk(nodeId) {
        if (seen.has(nodeId)) return;
        const node = getTaskNode(nodeId);
        if (!node) return;

        seen.add(nodeId);
        if (!isMemoNode(node) && node.isToday) result.push(nodeId);

        const children = getChildrenFromParent(node.id);
        for (let i = 0; i < children.length; i += 1) {
          walk(children[i]);
        }
      }

      const top = getChildrenFromParent(parentId);
      for (let i = 0; i < top.length; i += 1) {
        walk(top[i]);
      }

      return result;
    }

    function getImportantTaskIdsFrom(parentId) {
      const result = [];
      const seen = new Set();

      function walk(nodeId) {
        if (seen.has(nodeId)) return;
        const node = getTaskNode(nodeId);
        if (!node) return;

        seen.add(nodeId);
        if (!isMemoNode(node) && node.isImportant) result.push(nodeId);

        const children = getChildrenFromParent(node.id);
        for (let i = 0; i < children.length; i += 1) {
          walk(children[i]);
        }
      }

      const top = getChildrenFromParent(parentId);
      for (let i = 0; i < top.length; i += 1) {
        walk(top[i]);
      }

      return result;
    }

    function getMatrixRowsFrom(parentId) {
      const buckets = {
        urgentImportant: [],
        importantOnly: [],
        urgentOnly: [],
        neither: []
      };
      const seen = new Set();

      function walk(nodeId) {
        if (seen.has(nodeId)) return;
        const node = getTaskNode(nodeId);
        if (!node) return;

        seen.add(nodeId);
        if (!node.isCustomFolder && !isMemoNode(node) && !node.completed) {
          const row = { id: node.id, depth: 0, parentId: node.parentId };
          if (node.isToday && node.isImportant) {
            buckets.urgentImportant.push(row);
          } else if (node.isImportant) {
            buckets.importantOnly.push(row);
          } else if (node.isToday) {
            buckets.urgentOnly.push(row);
          } else {
            buckets.neither.push(row);
          }
        }

        const children = Array.isArray(node.children) ? node.children.slice() : [];
        for (let i = 0; i < children.length; i += 1) {
          walk(children[i]);
        }
      }

      const parent = getTaskNode(parentId);
      const top = parent && Array.isArray(parent.children) ? parent.children.slice() : [];
      for (let i = 0; i < top.length; i += 1) {
        walk(top[i]);
      }

      return {
        urgentImportant: sortTaskRowsByPriority(buckets.urgentImportant),
        importantOnly: sortTaskRowsByPriority(buckets.importantOnly),
        urgentOnly: sortTaskRowsByPriority(buckets.urgentOnly),
        neither: sortTaskRowsByPriority(buckets.neither)
      };
    }

    function getNextActionRows(rootId, limit = 3) {
      const root = getTaskNode(rootId);
      if (!root || !Array.isArray(root.children) || !root.children.length) return [];

      const today = [];
      const leaves = [];
      const fallback = [];
      const seen = new Set();

      function walk(nodeId) {
        if (seen.has(nodeId)) return;
        const node = getTaskNode(nodeId);
        if (!node || node.isCustomFolder) return;

        seen.add(nodeId);
        if (!isMemoNode(node) && !node.completed) {
          const row = { id: node.id, depth: 0, parentId: node.parentId };
          if (node.isToday) today.push(row);

          const children = Array.isArray(node.children)
            ? node.children.filter((childId) => {
              const child = getTaskNode(childId);
              return child && !child.isCustomFolder && !isMemoNode(child) && !child.completed;
            })
            : [];

          if (!children.length) {
            leaves.push(row);
          } else {
            fallback.push(row);
          }
        }

        const children = Array.isArray(node.children) ? node.children.slice() : [];
        for (let i = 0; i < children.length; i += 1) {
          walk(children[i]);
        }
      }

      for (let i = 0; i < root.children.length; i += 1) {
        walk(root.children[i]);
      }

      const used = new Set();
      const result = [];
      const addRows = (rows) => {
        const sorted = sortTaskRowsByPriority(rows);
        for (let i = 0; i < sorted.length && result.length < limit; i += 1) {
          const id = sorted[i].id;
          if (used.has(id) || id === rootId) continue;
          used.add(id);
          result.push(sorted[i]);
        }
      };

      addRows(today);
      addRows(leaves);
      addRows(fallback);
      return result;
    }

    function getVisibleTaskRows() {
      const parent = getTaskNode(currentParentId);
      if (!parent) return [];

      const rows = [];
      const applyKindFilter = (inputRows) => {
        if (currentViewMode !== 'all' && currentViewMode !== 'pathList' && currentViewMode !== 'date' && currentViewMode !== 'completed-date') {
          return inputRows;
        }
        if (currentKindFilter === 'all') return inputRows;
        return inputRows.filter((row) => {
          const node = getTaskNode(row.id);
          if (!node) return false;
          return currentKindFilter === 'memo' ? isMemoNode(node) : !isMemoNode(node);
        });
      };

      if (currentViewMode === 'today' && parent.id !== ROOT_ID) {
        const children = getChildrenFromParent(parent.id);
        for (let i = 0; i < children.length; i += 1) {
          const child = getTaskNode(children[i]);
          if (child && !isMemoNode(child)) {
            rows.push({ id: children[i], depth: 0, parentId: parent.id });
          }
        }
        return applyKindFilter(rows);
      }

      if (currentViewMode === 'today') {
        function collectOnlyToday(nodeId, isSubChild = false) {
          const node = getTaskNode(nodeId);
          if (!node) return;

          if (!isMemoNode(node) && node.isToday) {
            rows.push({ id: node.id, depth: isSubChild ? 0 : 0, parentId: node.parentId });
          }

          const children = getChildrenFromParent(node.id);
          for (let i = 0; i < children.length; i += 1) {
            collectOnlyToday(children[i], true);
          }
        }

        const top = getChildrenFromParent(parent.id);
        for (let i = 0; i < top.length; i += 1) {
          collectOnlyToday(top[i], false);
        }
        return applyKindFilter(sortTaskRowsByPriority(rows));
      }

      if (currentViewMode === 'date' && currentDateFilterKey) {
        const list = Object.values(state.nodes).filter((node) => node && node.id !== ROOT_ID);
        list.sort((a, b) => {
          const aDate = Date.parse(a.createdAt);
          const bDate = Date.parse(b.createdAt);
          if (Number.isNaN(aDate)) return 1;
          if (Number.isNaN(bDate)) return -1;
          return aDate - bDate;
        });

        for (let i = 0; i < list.length; i += 1) {
          if (formatDateKey(list[i].createdAt) === currentDateFilterKey) {
            rows.push({ id: list[i].id, depth: 0, parentId: list[i].parentId });
          }
        }
        return applyKindFilter(rows);
      }

      if (currentViewMode === 'completed-date' && currentCompletedDateFilterKey) {
        const list = Object.values(state.nodes).filter((node) => node && node.id !== ROOT_ID && node.completedAt);
        list.sort((a, b) => {
          const aDate = Date.parse(a.completedAt);
          const bDate = Date.parse(b.completedAt);
          if (Number.isNaN(aDate)) return 1;
          if (Number.isNaN(bDate)) return -1;
          return aDate - bDate;
        });

        for (let i = 0; i < list.length; i += 1) {
          if (formatDateKey(list[i].completedAt) === currentCompletedDateFilterKey) {
            rows.push({ id: list[i].id, depth: 0, parentId: list[i].parentId });
          }
        }
        return applyKindFilter(rows);
      }

      if (currentViewMode === 'important' && parent.id !== ROOT_ID) {
        const children = getChildrenFromParent(parent.id);
        for (let i = 0; i < children.length; i += 1) {
          const child = getTaskNode(children[i]);
          if (child && !isMemoNode(child)) {
            rows.push({ id: children[i], depth: 0, parentId: parent.id });
          }
        }
        return applyKindFilter(rows);
      }

      if (currentViewMode === 'important') {
        function collectOnlyImportant(nodeId) {
          const node = getTaskNode(nodeId);
          if (!node) return;

          if (!isMemoNode(node) && node.isImportant) {
            rows.push({ id: node.id, depth: 0, parentId: node.parentId });
          }

          const children = getChildrenFromParent(node.id);
          for (let i = 0; i < children.length; i += 1) {
            collectOnlyImportant(children[i]);
          }
        }

        const top = getChildrenFromParent(parent.id);
        for (let i = 0; i < top.length; i += 1) {
          collectOnlyImportant(top[i]);
        }
        return applyKindFilter(sortTaskRowsByPriority(rows));
      }

      if (currentViewMode === 'pathList' && currentPathListId) {
        const pathList = getPathListById(currentPathListId);
        if (!pathList || !Array.isArray(pathList.taskIds)) return rows;
        for (let i = 0; i < pathList.taskIds.length; i += 1) {
          const id = String(pathList.taskIds[i]);
          if (getTaskNode(id)) {
            rows.push({ id, depth: 0, parentId: ROOT_ID });
          }
        }
        return applyKindFilter(sortTaskRowsByPriority(rows));
      }

      const children = getChildrenFromParent(parent.id);
      for (let i = 0; i < children.length; i += 1) {
        rows.push({ id: children[i], depth: 0, parentId: parent.id });
      }
      return applyKindFilter(rows);
    }

    function isDescendant(ancestorId, nodeId) {
      let current = getTaskNode(nodeId);
      while (current) {
        if (current.id === ancestorId) return true;
        current = getTaskNode(current.parentId);
      }
      return false;
    }

    function setCurrentParent(id) {
      const nextParent = getTaskNode(id) ? id : ROOT_ID;
      if (currentViewMode === 'date') {
        currentViewMode = 'all';
        currentDateFilterKey = null;
        isDateSectionOpen = false;
      }
      if (currentViewMode === 'completed-date') {
        currentViewMode = 'all';
        currentCompletedDateFilterKey = null;
        isCompletedDateSectionOpen = false;
      }
      if (currentViewMode === 'pathList') {
        currentViewMode = 'all';
        currentPathListId = null;
        isDateSectionOpen = false;
        isCompletedDateSectionOpen = false;
      }
      if (currentViewMode === 'matrix') {
        currentViewMode = 'all';
        matrixShowNeither = false;
      }
      currentParentId = nextParent;
      memoTargetTaskId = nextParent === ROOT_ID ? null : nextParent;
      render();
      taskInput.focus();
    }

    function getTaskTreeText(rootId = currentParentId) {
      const root = getTaskNode(rootId);
      const startNode = root ? root : getTaskNode(ROOT_ID);
      const lines = [];
      if (!startNode) return '';

      const startTitle = startNode.id === ROOT_ID ? '루트' : startNode.title;
      const children = getChildrenFromParent(startNode.id);

      if (startNode.id !== ROOT_ID) {
        lines.push(startTitle || '이름 없음');
      }

      const walk = (nodeId, prefix) => {
        const kids = getChildrenFromParent(nodeId);
        for (let i = 0; i < kids.length; i += 1) {
          const childId = kids[i];
          const child = getTaskNode(childId);
          if (!child) continue;
          const isLast = i === kids.length - 1;
          const connector = isLast ? '└── ' : '├── ';
          const nextPrefix = prefix + (isLast ? '    ' : '│   ');

          lines.push(`${prefix}${connector}${child.title || '이름 없음'}`);
          walk(child.id, nextPrefix);
        }
      };

      walk(startNode.id, '');

      if (!lines.length) {
        return `${startTitle}의 하위 작업이 없습니다.`;
      }
      return lines.join('\n');
    }

    function exportTaskTreeText() {
      const content = getTaskTreeText(currentParentId);
      if (!content) return;
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = TASK_TREE_EXPORT_NAME;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    function placeActiveTaskByPriority(parentId, taskId) {
      const parent = getTaskNode(parentId);
      const task = getTaskNode(taskId);
      if (!parent || !task) return;

      const base = parent.children.filter((id) => id !== taskId);
      if (task.completed) {
        parent.children = enforceCompletedBoundary(base.concat([taskId]));
        return;
      }

      const active = [];
      const completed = [];
      const targetPriority = getPriorityValue(task);

      for (let i = 0; i < base.length; i += 1) {
        const node = getTaskNode(base[i]);
        if (!node) continue;
        if (node.completed) {
          completed.push(base[i]);
        } else {
          active.push(base[i]);
        }
      }

      let insert = active.length;
      let lastSame = -1;
      for (let i = 0; i < active.length; i += 1) {
        const p = getPriorityValue(getTaskNode(active[i]));
        if (p === targetPriority) {
          lastSame = i;
        }
        if (p > targetPriority) {
          insert = i;
          break;
        }
      }

      if (lastSame !== -1) {
        insert = Math.max(insert, lastSame + 1);
      }

      if (insert < 0) insert = 0;
      if (insert > active.length) insert = active.length;
      active.splice(insert, 0, taskId);
      parent.children = active.concat(completed);
      rebuildChildrenCache(parent.id);
    }

    function addTask(title, priority, isToday, kind = 'task') {
      const nodeKind = kind === 'memo' ? 'memo' : 'task';
      const node = {
        id: uid('task'),
        title,
        parentId: currentParentId,
        completed: false,
        isToday: nodeKind === 'task' ? Boolean(isToday) : false,
        isImportant: false,
        kind: nodeKind,
        memo: '',
        completedAt: null,
        priority: nodeKind === 'task' ? priority : null,
        createdAt: getNowIsoString(),
        createdOrder: state.nextOrder,
        children: []
      };
      state.nextOrder += 1;
      state.nodes[node.id] = node;

      const parent = getTaskNode(currentParentId);
      parent.children.push(node.id);
      placeActiveTaskByPriority(parent.id, node.id);
      saveState();
      render();
    }

    function toggleComplete(id) {
      const node = getTaskNode(id);
      if (!node) return;
      if (isMemoNode(node)) return;
      const parent = getTaskNode(node.parentId);
      if (!parent) return;

      node.completed = !node.completed;
      node.completedAt = node.completed ? getNowIsoString() : null;
      const childIndex = parent.children.indexOf(id);
      if (childIndex === -1) return;

      if (node.completed) {
        const list = parent.children.filter((tid) => tid !== id);
        list.push(id);
        parent.children = enforceCompletedBoundary(list);
        rebuildChildrenCache(parent.id);
      } else {
        placeActiveTaskByPriority(parent.id, id);
      }

      saveState();
      render();
    }

    function updatePriority(id, raw) {
      const node = getTaskNode(id);
      if (!node) return;
      if (isMemoNode(node)) return;
      node.priority = parsePriority(raw);

      if (!node.completed) {
        placeActiveTaskByPriority(node.parentId, id);
      }
      saveState();
      render();
    }

    function updateMemo(id) {
      const node = getTaskNode(id);
      if (!node) return;
      memoTargetTaskId = node.id;
      renderMemoPanel();
      memoPanelInput.focus();
    }

    function updateNodeKind(id, kind) {
      const node = getTaskNode(id);
      if (!node || node.id === ROOT_ID || node.isCustomFolder) return;

      const nextKind = kind === 'memo' ? 'memo' : 'task';
      const applyKind = (targetNode, targetKind) => {
        if (!targetNode || targetNode.id === ROOT_ID || targetNode.isCustomFolder) return;
        targetNode.kind = targetKind;
        if (targetNode.kind === 'memo') {
          targetNode.completed = false;
          targetNode.completedAt = null;
          targetNode.isToday = false;
          targetNode.isImportant = false;
          targetNode.priority = null;
        }
      };

      if (nextKind === 'memo') {
        const seen = new Set();
        const applySubtree = (nodeId) => {
          if (seen.has(nodeId)) return;
          seen.add(nodeId);

          const target = getTaskNode(nodeId);
          if (!target) return;
          applyKind(target, 'memo');

          const children = Array.isArray(target.children) ? target.children.slice() : [];
          for (let i = 0; i < children.length; i += 1) {
            applySubtree(children[i]);
          }
        };

        applySubtree(id);
      } else {
        applyKind(node, 'task');
      }

      saveState();
      render();
    }

    function markAsNextAction(id) {
      const node = getTaskNode(id);
      if (!node || node.id === ROOT_ID || node.isCustomFolder) return;

      node.kind = 'task';
      node.completed = false;
      node.completedAt = null;
      node.isToday = true;
      saveState();
      render();
    }

      function cloneTaskSubtree(sourceId, targetParentId) {
        const source = getTaskNode(sourceId);
        const targetParent = getTaskNode(targetParentId);
        if (!source || !targetParent) return null;

        const cloneNodeRecursively = (sourceNode) => {
          const sourceKind = getNodeKind(sourceNode);
          const copied = {
            id: sourceNode.isCustomFolder ? uid('folder') : uid('task'),
            title: sourceNode.title,
            parentId: targetParentId,
            completed: sourceKind === 'task' ? sourceNode.completed : false,
            completedAt: sourceKind === 'task' && sourceNode.completed ? sourceNode.completedAt || getNowIsoString() : null,
            isToday: sourceKind === 'task' ? sourceNode.isToday : false,
            isImportant: sourceKind === 'task' ? sourceNode.isImportant : false,
            kind: sourceKind,
            memo: sourceNode.memo || '',
            priority: sourceNode.priority,
            createdAt: getNowIsoString(),
            createdOrder: state.nextOrder,
            children: [],
            isCustomFolder: Boolean(sourceNode.isCustomFolder)
          };

          state.nextOrder += 1;
          state.nodes[copied.id] = copied;

          const sourceChildren = getChildrenFromParent(sourceNode.id);
          for (let i = 0; i < sourceChildren.length; i += 1) {
            const sourceChild = getTaskNode(sourceChildren[i]);
            if (!sourceChild) continue;

            const childCopied = cloneNodeRecursively(sourceChild);
            if (!childCopied) continue;

            childCopied.parentId = copied.id;
            copied.children.push(childCopied.id);
          }

          return copied;
        };

        const cloned = cloneNodeRecursively(source);
        if (!cloned) return null;

        const rootId = cloned.id;
        targetParent.children.push(rootId);
        placeActiveTaskByPriority(targetParent.id, rootId);

        if (cloned.isCustomFolder && targetParent.id === ROOT_ID) {
          state.customTabs.push({
            id: cloned.id,
            title: cloned.title,
            createdOrder: cloned.createdOrder
          });
          state.customTabs = dedupeCustomTabs(state.customTabs);
        }

        rebuildChildrenCache(targetParent.id);
        saveState();
        render();
        return rootId;
      }

    function updateImportantFlag(id, isImportant) {
      const node = getTaskNode(id);
      if (!node) return;
      if (isMemoNode(node)) return;
      node.isImportant = Boolean(isImportant);
      saveState();
      render();
    }

    function updateTodayFlag(id, isToday) {
      const node = getTaskNode(id);
      if (!node) return;
      if (isMemoNode(node)) return;
      node.isToday = Boolean(isToday);
      saveState();
      render();
    }

    function clearTodayInCurrentView() {
      if (currentViewMode !== 'today') return;

      const todayIds = getTodayTaskIdsFrom(currentParentId);
      if (!todayIds.length) {
        window.alert('현재 오늘 할일 목록이 비어 있습니다.');
        return;
      }

      const yes = window.confirm(`오늘 할일 목록의 ${todayIds.length}개 항목을 전부 해제할까요?`);
      if (!yes) return;

      for (let i = 0; i < todayIds.length; i += 1) {
        const node = getTaskNode(todayIds[i]);
        if (node) {
          node.isToday = false;
        }
      }

      saveState();
      render();
    }

    function renameTask(id, nextTitle) {
      const node = getTaskNode(id);
      if (!node) return;

      const title = sanitizeTaskTitle(nextTitle);
      if (!title) return;

      if (title === node.title) return;

      node.title = title;
      saveState();
      render();
    }

    function moveTaskInSameParent(movedId, targetId = null, position = 'before', parentId = currentParentId) {
      const parent = getTaskNode(parentId);
      if (!parent) return;

      const moved = getTaskNode(movedId);
      if (!moved) return;

      if (moved.parentId !== parent.id && moved.parentId) {
        const oldParent = getTaskNode(moved.parentId);
        if (oldParent) {
          oldParent.children = oldParent.children.filter((id) => id !== movedId);
          rebuildChildrenCache(oldParent.id);
        }
      }
      moved.parentId = parent.id;

      const list = parent.children.filter((id) => id !== movedId);

      if (!targetId) {
        list.push(movedId);
        parent.children = enforceCompletedBoundary(list);
        rebuildChildrenCache(parent.id);
        saveState();
        render();
        return;
      }

      const targetIndex = list.indexOf(targetId);
      if (targetIndex === -1) {
        list.push(movedId);
        parent.children = enforceCompletedBoundary(list);
        rebuildChildrenCache(parent.id);
        saveState();
        render();
        return;
      }

      const insert = targetIndex + (position === 'after' ? 1 : 0);
      const bounded = insert;
      const insertIndex = Math.max(0, Math.min(bounded, list.length));

      if (moved.completed) {
        list.push(movedId);
        parent.children = enforceCompletedBoundary(list);
      } else {
        list.splice(insertIndex, 0, movedId);
        parent.children = enforceCompletedBoundary(list);
      }
      rebuildChildrenCache(parent.id);

      saveState();
      render();
    }

    function addToParentByPriority(taskId, targetParentId) {
      const node = getTaskNode(taskId);
      const target = getTaskNode(targetParentId);
      if (!node || !target) return;

      if (!target.children.includes(taskId)) {
        target.children.push(taskId);
      }

      if (node.completed) {
        target.children = enforceCompletedBoundary(target.children);
      } else {
        placeActiveTaskByPriority(targetParentId, taskId);
      }

      rebuildChildrenCache(target.id);
    }

    function moveTaskIntoTask(movedId, targetTaskId) {
      const moved = getTaskNode(movedId);
      const target = getTaskNode(targetTaskId);
      if (!moved || !target) return;
      if (target.id === moved.id) return;
      if (isDescendant(moved.id, target.id)) return;

      const oldParent = getTaskNode(moved.parentId);
      if (oldParent) {
        oldParent.children = oldParent.children.filter((id) => id !== moved.id);
        rebuildChildrenCache(oldParent.id);
      }

      moved.parentId = target.id;
      if (!target.children.includes(moved.id)) {
        target.children.push(moved.id);
      }
      addToParentByPriority(moved.id, target.id);

      if (!oldParent) {
        currentParentId = ROOT_ID;
      }
      if (currentParentId === ROOT_ID && oldParent && oldParent.id !== ROOT_ID) {
        // no-op, keep current root
      }

      saveState();
      render();
    }

    function moveTaskToParent(id) {
      const node = getTaskNode(id);
      if (!node) return;

      const parent = getTaskNode(node.parentId);
      if (!parent || parent.id === ROOT_ID) return;

      const grandParent = getTaskNode(parent.parentId);
      if (!grandParent) return;

      parent.children = parent.children.filter((tid) => tid !== id);
      rebuildChildrenCache(parent.id);
      node.parentId = grandParent.id;

      if (!grandParent.children.includes(id)) {
        const insertIndex = grandParent.children.indexOf(parent.id) + 1;
        grandParent.children.splice(
          Math.max(0, Math.min(insertIndex, grandParent.children.length)),
          0,
          id
        );
      }

      if (!node.completed) {
        placeActiveTaskByPriority(grandParent.id, id);
      } else {
        grandParent.children = enforceCompletedBoundary(grandParent.children);
      }
      rebuildChildrenCache(grandParent.id);

      saveState();
      render();
    }

    function deleteTask(id) {
      const node = getTaskNode(id);
      if (!node || id === ROOT_ID) return;

      const yes = window.confirm(`"${node.title}"을(를) 삭제할까요? 하위 작업도 함께 삭제됩니다.`);
      if (!yes) return;

      const parent = getTaskNode(node.parentId);
      if (parent) {
        parent.children = parent.children.filter((tid) => tid !== id);
        rebuildChildrenCache(parent.id);
      }

      const removedIds = new Set();
      const stack = [id];
      while (stack.length) {
        const currentId = stack.pop();
        const currentNode = getTaskNode(currentId);
        if (!currentNode) continue;
        removedIds.add(currentId);

        if (Array.isArray(currentNode.children) && currentNode.children.length) {
          stack.push(...currentNode.children);
        }

        childrenCache.delete(currentId);
        delete state.nodes[currentId];
      }

      if (removedIds.size) {
        removedIds.forEach((removedId) => {
          removeCustomTabFromRegistry(removedId);
          removeTaskFromPathLists(removedId);
        });
      }

      if (currentParentId === id) {
        currentParentId = ROOT_ID;
      }
      if (memoTargetTaskId === id || (memoTargetTaskId && isDescendant(id, memoTargetTaskId))) {
        memoTargetTaskId = null;
      }

      saveState();
      render();
    }

    function renderTabs() {
      const parent = getTaskNode(currentParentId);
      const childIds = (parent && parent.children)
        ? (parent.id === ROOT_ID
          ? parent.children.filter((id) => !state.nodes[id]?.isCustomFolder)
          : parent.children)
        : [];
      const todayCount = getTodayTaskIdsFrom(currentParentId).length;
      const importantCount = getImportantTaskIdsFrom(currentParentId).length;
      const matrixBuckets = getMatrixRowsFrom(currentParentId);
      const matrixCount = matrixBuckets.urgentImportant.length
        + matrixBuckets.importantOnly.length
        + matrixBuckets.urgentOnly.length;

      tabAll.textContent = `전체 (${childIds.length})`;
      tabToday.textContent = `오늘 할일 (${todayCount})`;
      tabImportant.textContent = `⭐ 중요 (${importantCount})`;
      tabMatrix.textContent = `4분할 (${matrixCount})`;
      tabAll.classList.toggle('active', currentViewMode === 'all');
      tabToday.classList.toggle('active', currentViewMode === 'today');
      tabImportant.classList.toggle('active', currentViewMode === 'important');
      tabMatrix.classList.toggle('active', currentViewMode === 'matrix');
      kindFilterAllBtn.classList.toggle('active', currentKindFilter === 'all');
      kindFilterTaskBtn.classList.toggle('active', currentKindFilter === 'task');
      kindFilterMemoBtn.classList.toggle('active', currentKindFilter === 'memo');
      clearTodayBtn.style.display = currentViewMode === 'today' ? '' : 'none';
    }

    function openCustomTab(tabId) {
      if (!getTaskNode(tabId)) return;
      currentViewMode = 'all';
      currentDateFilterKey = null;
      currentCompletedDateFilterKey = null;
      isDateSectionOpen = false;
      isCompletedDateSectionOpen = false;
      currentPathListId = null;
      setCurrentParent(tabId);
    }

    function renderCustomTabs() {
      if (!customTabList) return;
      customTabList.innerHTML = '';
      const list = Array.isArray(state.customTabs)
        ? [...state.customTabs].filter((tab) => {
          const node = getTaskNode(tab.id);
          return node && node.isCustomFolder && node.parentId === ROOT_ID;
        })
        : [];

      list.sort((a, b) => (a.createdOrder - b.createdOrder));
      for (let i = 0; i < list.length; i += 1) {
        const tab = list[i];
        const item = document.createElement('div');
        item.className = 'custom-tab-item';
        item.draggable = currentViewMode === 'all';
        item.dataset.id = tab.id;

        const openBtn = document.createElement('button');
        openBtn.type = 'button';
        openBtn.className = 'custom-tab-open';
        openBtn.textContent = tab.title || '폴더';
        openBtn.title = tab.title || '폴더';
        openBtn.classList.toggle('active', currentViewMode === 'all' && currentParentId === tab.id);

        openBtn.addEventListener('click', () => {
          openCustomTab(tab.id);
        });

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'custom-tab-delete';
        delBtn.textContent = '×';
        delBtn.title = `${tab.title || '폴더'} 삭제`;
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteTask(tab.id);
        });

        item.addEventListener('dragstart', (e) => {
          if (currentViewMode !== 'all') return;
          draggingTaskId = null;
          draggingCustomTabId = tab.id;
          draggingSavedListId = null;
          item.classList.add('dragging-target');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.dropEffect = 'move';
          e.dataTransfer.setData('text/plain', tab.id);
        });

        item.addEventListener('dragend', () => {
          draggingCustomTabId = null;
          draggingTaskId = null;
          item.classList.remove('dragging-target');
          document.querySelectorAll('.custom-tab-item.dragging-target').forEach((i) => {
            i.classList.remove('dragging-target');
          });
          document.querySelectorAll('.task-item').forEach((taskItem) => {
            taskItem.classList.remove('drag-before', 'drag-into');
            delete taskItem.dataset.dropSide;
          });
        });

        item.addEventListener('dragover', (e) => {
          e.stopPropagation();
          if (currentViewMode !== 'all') return;

          if (draggingTaskId) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            if (String(draggingTaskId) === String(tab.id)) return;
            item.classList.add('dragging-target');
            return;
          }

          if (!draggingCustomTabId) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (String(draggingCustomTabId) === String(tab.id)) return;
          item.classList.add('dragging-target');
        });

        item.addEventListener('dragleave', () => {
          item.classList.remove('dragging-target');
        });

        item.addEventListener('drop', (e) => {
          e.stopPropagation();
          if (currentViewMode !== 'all') return;
          e.preventDefault();

          if (draggingCustomTabId) {
            if (String(draggingCustomTabId) !== String(tab.id)) {
              const sourceIndex = state.customTabs.findIndex((customTab) => String(customTab.id) === String(draggingCustomTabId));
              const targetIndex = state.customTabs.findIndex((customTab) => String(customTab.id) === String(tab.id));
              if (sourceIndex !== -1 && targetIndex !== -1) {
                moveCustomTab(sourceIndex, targetIndex);
              }
            }

            draggingCustomTabId = null;
            item.classList.remove('dragging-target');
            return;
          }

          if (!draggingTaskId) return;
          moveTaskIntoTask(draggingTaskId, tab.id);
          draggingTaskId = null;
          item.classList.remove('dragging-target');
        });

        item.appendChild(openBtn);
        item.appendChild(delBtn);
        customTabList.appendChild(item);
      }
    }

    function renderPathLists() {
      if (!pathListContainer) return;
      pathListContainer.innerHTML = '';

      const list = Array.isArray(state.pathLists) ? [...state.pathLists].sort((a, b) => (a.createdOrder - b.createdOrder)) : [];
      for (let i = 0; i < list.length; i += 1) {
        const pathList = list[i];
        const item = document.createElement('div');
        item.className = 'custom-tab-item';
        item.draggable = currentViewMode === 'all';
        item.dataset.id = pathList.id;

        const openBtn = document.createElement('button');
        openBtn.type = 'button';
        openBtn.className = 'custom-tab-open';
        openBtn.textContent = pathList.title || '목록';
        openBtn.title = pathList.title || '목록';
        openBtn.classList.toggle('active', currentViewMode === 'pathList' && currentPathListId === pathList.id);
        openBtn.addEventListener('click', () => {
          openPathList(pathList.id);
        });

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'custom-tab-delete';
        delBtn.textContent = '×';
        delBtn.title = `${pathList.title || '목록'} 삭제`;
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!window.confirm(`"${pathList.title || '목록'}"을(를) 삭제할까요?`)) return;
          state.pathLists = state.pathLists.filter((listItem) => String(listItem.id) !== String(pathList.id));
          if (String(currentPathListId) === String(pathList.id)) {
            currentPathListId = null;
            currentViewMode = 'all';
            currentParentId = ROOT_ID;
          }
          saveState();
          render();
        });

        item.addEventListener('dragstart', (e) => {
          if (currentViewMode !== 'all') return;
          draggingTaskId = null;
          draggingSavedListId = pathList.id;
          item.classList.add('dragging-target');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.dropEffect = 'move';
          e.dataTransfer.setData('text/plain', pathList.id);
        });

        item.addEventListener('dragend', () => {
          draggingSavedListId = null;
          item.classList.remove('dragging-target');
          document.querySelectorAll('.custom-tab-item.dragging-target').forEach((targetItem) => {
            targetItem.classList.remove('dragging-target');
          });
          document.querySelectorAll('.task-item').forEach((taskItem) => {
            taskItem.classList.remove('drag-before', 'drag-into');
            delete taskItem.dataset.dropSide;
          });
        });

        item.addEventListener('dragover', (e) => {
          e.stopPropagation();
          if (!draggingSavedListId && !draggingTaskId) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          if (draggingSavedListId) {
            if (currentViewMode !== 'all') return;
            if (String(draggingSavedListId) === String(pathList.id)) return;
            item.classList.add('dragging-target');
            return;
          }

          const draggedNode = getTaskNode(draggingTaskId);
          if (!draggedNode || draggedNode.isCustomFolder) return;
          if (currentViewMode !== 'all' || String(draggingTaskId) === String(pathList.id)) return;
          item.classList.add('dragging-target');
        });

        item.addEventListener('dragleave', () => {
          item.classList.remove('dragging-target');
        });

        item.addEventListener('drop', (e) => {
          e.stopPropagation();

          if (draggingSavedListId) {
            e.preventDefault();
            if (currentViewMode !== 'all') {
              draggingSavedListId = null;
              return;
            }
            if (String(draggingSavedListId) === String(pathList.id)) {
              draggingSavedListId = null;
              item.classList.remove('dragging-target');
              return;
            }
            const sourceIndex = state.pathLists.findIndex((listItem) => String(listItem.id) === String(draggingSavedListId));
            const targetIndex = state.pathLists.findIndex((listItem) => String(listItem.id) === String(pathList.id));
            if (sourceIndex !== -1 && targetIndex !== -1) {
              movePathList(sourceIndex, targetIndex);
            }
            draggingSavedListId = null;
            item.classList.remove('dragging-target');
            return;
          }

          if (currentViewMode !== 'all' || !draggingTaskId) return;
          e.preventDefault();
          const node = getTaskNode(draggingTaskId);
          if (!node || node.isCustomFolder) {
            draggingTaskId = null;
            item.classList.remove('dragging-target');
            return;
          }
          addTaskToPathList(draggingTaskId, pathList.id);
          draggingTaskId = null;
          item.classList.remove('dragging-target');
        });

        item.appendChild(openBtn);
        item.appendChild(delBtn);
        pathListContainer.appendChild(item);
      }
    }

    function renderCreatedDateList() {
      if (!createdDateList) return;
      createdDateList.innerHTML = '';

      const dateBuckets = {};
      Object.values(state.nodes).forEach((node) => {
        if (!node || node.id === ROOT_ID) return;
        const dateKey = formatDateKey(node.createdAt);
        if (!dateKey) return;
        if (!dateBuckets[dateKey]) {
          dateBuckets[dateKey] = { key: dateKey, count: 0, createdAt: node.createdAt };
        }
        dateBuckets[dateKey].count += 1;
        if (new Date(node.createdAt) > new Date(dateBuckets[dateKey].createdAt)) {
          dateBuckets[dateKey].createdAt = node.createdAt;
        }
      });

      const list = Object.values(dateBuckets).sort((a, b) => {
        const dateA = new Date(b.key);
        const dateB = new Date(a.key);
        if (Number.isNaN(dateA.getTime()) || Number.isNaN(dateB.getTime())) return 0;
        return dateB.getTime() - dateA.getTime();
      });

      if (!list.length) {
        const empty = document.createElement('div');
        empty.className = 'custom-tab-item';
        const emptyText = document.createElement('button');
        emptyText.type = 'button';
        emptyText.className = 'custom-tab-open';
        emptyText.style.flex = '1';
        emptyText.textContent = '작성된 날짜가 없습니다';
        emptyText.disabled = true;
        empty.appendChild(emptyText);
        createdDateList.appendChild(empty);
        return;
      }

      for (let i = 0; i < list.length; i += 1) {
        const item = list[i];
        const row = document.createElement('div');
        row.className = 'custom-tab-item';
        row.draggable = false;

        const openBtn = document.createElement('button');
        openBtn.type = 'button';
        openBtn.className = 'custom-tab-open';
        openBtn.textContent = `${formatDateLabel(item.createdAt)} (${item.count})`;
        openBtn.title = `${item.key} (${item.count}개)`;
        openBtn.classList.toggle('active', currentViewMode === 'date' && currentDateFilterKey === item.key);
        openBtn.addEventListener('click', () => {
          openDateFilter(item.key);

        const delBtn = document.createElement('button');
        delBtn.type = 'button';
        delBtn.className = 'custom-tab-delete';
        delBtn.textContent = '×';
        delBtn.title = '지우기';
        delBtn.style.display = 'none';

        row.appendChild(openBtn);
        row.appendChild(delBtn);
        createdDateList.appendChild(row);
      }
    }

      const parent = getTaskNode(currentParentId);
      const shouldDefaultMemo = parent && parent.id !== ROOT_ID && isMemoNode(parent);
      taskKindInput.value = shouldDefaultMemo ? 'memo' : 'task';
      taskPriorityInput.disabled = shouldDefaultMemo;
      taskTodayInput.disabled = shouldDefaultMemo;
      if (shouldDefaultMemo) {
        taskPriorityInput.value = '';
        taskTodayInput.checked = false;
      }
