<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>작업 탐색기</title>
  <style>
    :root {
      --bg: #f2f6ff;
      --panel: #ffffff;
      --line: #d8e0ef;
      --text: #12213a;
      --muted: #65728c;
      --primary: #1f6feb;
      --primary-soft: #e8efff;
      --danger: #ef4444;
      --danger-soft: #ffe9e9;
      --shadow: 0 14px 40px rgba(18, 33, 58, 0.08);
      --sidebar-width: clamp(170px, 18vw, 220px);
      --memo-width: clamp(280px, 30vw, 360px);
      --base-font: clamp(13px, 0.95vw, 16px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: var(--base-font);
      color: var(--text);
      background: radial-gradient(120% 120% at 0% 0%, #e8f0ff 0%, var(--bg) 40%, #f9fbff 100%);
      min-height: 100vh;
      padding: 16px 22px;
      overflow-x: hidden;
    }

    .app {
      width: min(100%, calc(100vw - 24px));
      max-width: none;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px 0;
      font-size: 28px;
      letter-spacing: 0.02em;
    }

    .subtle {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .workspace {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr;
      gap: 12px;
      align-items: start;
    }

    .side-tabs {
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 16px;
    }

    .side-tabs button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 12px 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .side-tabs button.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #1f4ebf;
    }

    .top-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .top-tabs button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .top-tabs button.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #1f4ebf;
    }

    .kind-filter-tabs {
      display: flex;
      gap: 6px;
      margin: 0 0 12px 0;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .kind-filter-tabs button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .kind-filter-tabs button.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #1f4ebf;
    }

    .side-section-title {
      display: inline-block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      padding: 2px 4px 6px 0;
      letter-spacing: 0.02em;
    }

    .custom-tab-create {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      margin-top: 4px;
    }

    .custom-tab-create input {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      min-width: 0;
    }

    .custom-tab-create button {
      padding: 8px 10px;
      min-width: auto;
      font-weight: 700;
    }

    .custom-tab-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 2px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
      min-height: 100px;
      padding-bottom: 8px;
      padding-top: 2px;
    }

    .date-section {
      display: none;
      margin-top: 2px;
      transition: max-height 0.2s ease;
    }

    .date-section.open {
      display: block;
    }

    .date-section-toggle {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      text-align: left;
      width: 100%;
    }

    .custom-tab-item {
      width: 100%;
      display: flex;
      align-items: stretch;
      gap: 6px;
    }

    .custom-tab-item.dragging-target {
      outline: 2px dashed var(--primary);
      outline-offset: -2px;
    }

    .custom-tab-open {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
      flex: 1;
      min-width: 0;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .custom-tab-open:hover {
      border-color: #b6c7ea;
      background: #f8fbff;
    }

    .custom-tab-open.active {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #1f4ebf;
    }

    .custom-tab-delete {
      border: 1px solid #f5bcbc;
      background: #fff6f6;
      color: #8a1e1e;
      border-radius: 10px;
      cursor: pointer;
      padding: 0 0;
      font-size: 14px;
      min-width: 26px;
      width: 26px;
      font-weight: 700;
      white-space: nowrap;
      align-self: stretch;
    }

    .custom-tab-delete:hover {
      background: #ffecec;
    }

    .content {
      min-width: 0;
    }

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px;
      margin-bottom: 16px;
  box-shadow: var(--shadow);
  min-width: 0;
}

.content-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, var(--memo-width));
  gap: 12px;
  align-items: start;
}

.matrix-mode .content-grid {
  grid-template-columns: minmax(0, 1fr);
}

.matrix-mode .memo-panel {
  display: none;
}

.memo-panel {
  width: 100%;
  max-width: none;
}

.memo-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin: 0 0 8px 0;
}

.memo-subtitle {
  color: var(--muted);
  font-size: 12px;
  margin: 0 0 10px 0;
}

.memo-input {
  width: 100%;
  min-height: 220px;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 12px;
  resize: vertical;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}

.memo-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.12);
}

.memo-empty {
  color: var(--muted);
  font-size: 12px;
  margin-top: 6px;
}

.path-row {
  display: flex;
  align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .crumb {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text);
      font-weight: 600;
    }

    .crumb.current {
      border-color: var(--primary);
      background: var(--primary-soft);
      color: #1f4ebf;
    }

    .sep {
      color: var(--muted);
      font-weight: 700;
    }

    .path-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 96px 130px 140px auto;
      gap: 10px;
      margin-top: 10px;
    }

    .form-grid > * {
      min-width: 0;
    }

    .form-grid input,
    .form-grid button,
    .inline-check,
    .task-title,
    .task-actions input {
      font-family: inherit;
    }

    .form-grid input,
    .inline-check,
    .task-actions input,
    .form-grid button {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }

    .form-grid input:focus,
    .task-actions input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.12);
    }

    .inline-check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      font-size: 14px;
    }

    .inline-check input {
      width: 16px;
      height: 16px;
      padding: 0;
      margin: 0;
      accent-color: var(--primary);
    }

    .kind-select {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
      font-family: inherit;
    }

    .task-kind-badge {
      flex: 0 0 auto;
      border: 1px solid #c9d7ec;
      background: #f7faff;
      color: #294572;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .task-kind-badge.memo {
      border-color: #e3d2aa;
      background: #fff9eb;
      color: #7a5415;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
    }

    .btn-add {
      background: var(--primary);
      color: white;
      min-width: 110px;
    }

    .btn-secondary {
      background: #eaf0fb;
      color: #1f366f;
    }

    .btn-done {
      background: #f3f6ff;
      color: #1d47af;
    }

    .btn-danger {
      background: var(--danger-soft);
      color: #a70000;
      font-size: 12px;
      padding: 7px 10px;
    }

    .btn-move {
      background: #f7f9ff;
      color: #30446a;
      font-size: 12px;
      padding: 7px 10px;
      min-width: 34px;
    }

    .btn-star {
      width: 34px;
      min-width: 34px;
      padding: 7px 0;
      font-size: 16px;
      color: #8d95a8;
      background: #fff;
    }

    .btn-star.active {
      color: #f0a500;
    }

    .storage-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .paste-tree-box {
      margin-top: 12px;
      display: none;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .paste-tree-box.open {
      display: grid;
    }

    .paste-tree-input {
      width: 100%;
      min-height: 84px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      resize: vertical;
      font-size: 13px;
      outline: none;
      font-family: inherit;
      background: #fff;
    }

    .paste-tree-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(31, 111, 235, 0.12);
    }

    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
      min-height: 140px;
      padding-bottom: 8px;
      max-height: 680px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .matrix-view {
      display: none;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 12px;
      height: clamp(520px, calc(100vh - 300px), 820px);
      overflow-y: hidden;
      overflow-x: hidden;
      padding-right: 4px;
    }

    .matrix-view.open {
      display: grid;
    }

    .matrix-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
      min-width: 0;
      min-height: 0;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .matrix-card.primary {
      border-color: #9bbaf4;
      background: #f4f8ff;
    }

    .matrix-card.important-only {
      border-color: #b9d7a8;
      background: #f7fbf3;
    }

    .matrix-card.urgent-only {
      border-color: #f1c99f;
      background: #fff8ef;
    }

    .matrix-card.quiet {
      border-color: #d2dae8;
      background: #fafcff;
    }

    .matrix-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .matrix-title {
      font-weight: 800;
      font-size: 14px;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .matrix-count {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .matrix-list {
      list-style: none;
      margin: 0;
      padding: 0;
      min-width: 0;
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 2px;
    }

    .matrix-list .task-item {
      padding: 12px 10px;
      min-height: 54px;
      margin-bottom: 8px;
    }

    .matrix-list .task-title {
      font-size: 13px;
    }

    .matrix-list .task-meta {
      max-width: 42%;
    }

    .matrix-empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 14px 10px;
      text-align: center;
      font-size: 13px;
      background: #fff;
    }

    .matrix-more {
      width: 100%;
      margin-top: 4px;
      border-radius: 8px;
    }

    .next-actions {
      margin: -2px 0 8px 28px;
      padding: 8px 10px;
      border-left: 2px solid #d6e1f3;
      background: rgba(255, 255, 255, 0.58);
      border-radius: 0 8px 8px 0;
    }

    .next-actions-title {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .next-action-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      margin-top: 4px;
    }

    .next-action-open {
      min-width: 0;
      flex: 1 1 auto;
      border: 0;
      background: transparent;
      color: #21385f;
      padding: 3px 0;
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .next-action-done {
      border: 1px solid #c9d7ec;
      background: #f7faff;
      color: #294572;
      border-radius: 8px;
      padding: 4px 7px;
      font-size: 11px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .task-item {
      border: 1px solid var(--line);
      background: #fefefe;
      border-radius: 10px;
      padding: 18px 14px;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 10px;
      position: relative;
      margin-bottom: 10px;
      cursor: grab;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
      min-height: 64px;
      max-height: none;
      overflow: visible;
    }

    .matrix-list .task-item {
      overflow: hidden;
    }

    .task-item:hover {
      border-color: #b6c7ea;
      box-shadow: 0 8px 20px rgba(15, 42, 95, 0.08);
    }

    .task-item.dragging {
      opacity: 0.7;
      transform: scale(0.995);
    }

    .task-item.drag-before {
      border-top: 2px solid var(--primary);
    }

    .task-item.drag-into {
      background: #eef5ff;
      border: 1px dashed var(--primary);
    }

    .task-main {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-width: 0;
      flex: 1 1 auto;
      min-height: 0;
      padding-right: 10px;
    }

    .handle {
      color: #8b9ebf;
      user-select: none;
      pointer-events: none;
      font-size: 14px;
    }

    .task-title {
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 600;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 10px 0;
      border: 0;
      background: transparent;
      flex: 2 1 auto;
      min-width: 0;
      color: inherit;
      text-align: left;
      min-height: 28px;
      margin-right: 8px;
    }

    .task-meta {
      font-size: clamp(10px, 0.85vw, 12px);
      color: var(--muted);
      margin-left: 4px;
      white-space: nowrap;
      flex: 0 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: none;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: nowrap;
      justify-content: flex-end;
      position: static;
      transform: none;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      display: none;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      -ms-overflow-style: none;
      width: auto;
      max-width: min(58%, 720px);
      margin-left: auto;
      transition: opacity 0.15s ease;
    }

    .task-item:hover .task-meta,
    .task-item:focus-within .task-meta {
      display: none;
    }

    .matrix-list .task-actions {
      max-width: min(62%, 520px);
    }

    .task-item:hover .task-actions,
    .task-item:focus-within .task-actions {
      display: flex;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .task-actions::-webkit-scrollbar {
      height: 4px;
    }

    .task-actions button {
      padding: 7px 10px;
      font-size: clamp(10px, 0.78vw, 12px);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .priority-input {
      width: 74px;
      padding: 7px 8px !important;
      font-size: 12px;
      text-align: center;
    }

    .checkbox-mini {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #223;
      white-space: nowrap;
    }

    .checkbox-mini input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: var(--primary);
    }

    .task-item.done {
      background: #f8fff9;
      border-color: #9bd3a4;
    }

    .task-item.done .task-title {
      color: #2f7e43;
      text-decoration: line-through;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 20px 8px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #fbfdff;
    }

    .hint {
      margin: 0;
      color: #31456a;
      background: #ecf2ff;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px dashed #bfd1f6;
    }

    .action-note {
      margin: 0;
      color: #3154a1;
      font-size: 12px;
    }

    @media (max-width: 800px) {
      body {
        padding: 14px;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .side-tabs {
        position: static;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .task-actions {
        position: static;
        transform: none;
        display: flex;
        width: 100%;
        max-width: 100%;
        margin-top: 8px;
        flex-wrap: wrap;
        justify-content: flex-start;
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .task-item {
        display: block;
        overflow: hidden;
      }

      .task-main {
        padding-right: 0;
        align-items: flex-start;
      }

      .task-meta {
        display: none;
      }

      .matrix-view {
        grid-template-columns: 1fr;
        grid-template-rows: none;
        height: auto;
        overflow: visible;
      }

      .task-title {
        min-width: 0;
        white-space: normal;
        overflow-wrap: anywhere;
        line-height: 1.35;
      }

    .custom-tab-list {
      max-height: 170px;
    }

      .content-grid {
        grid-template-columns: 1fr;
      }

      .memo-panel {
        max-width: none;
      }
  }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 150px 1fr;
      }

      .content-grid {
        grid-template-columns: minmax(0, 1fr) minmax(220px, 300px);
      }

      .memo-input {
        min-height: 180px;
      }

    }

    @media (max-width: 1280px) {
      .form-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }

      .form-grid .btn-add {
        grid-column: span 2;
      }
    }

    @media (max-width: 920px) {
      :root {
        --sidebar-width: 132px;
        --memo-width: 250px;
      }

      .task-item {
        padding: 11px 10px;
      }

      .task-title {
        font-size: 13px;
      }

      .task-meta {
        font-size: 10px;
      }

      .matrix-list .task-meta {
        display: none;
      }
    }

    @media (max-width: 800px) {
      .workspace,
      .content-grid {
        grid-template-columns: 1fr;
      }

      .matrix-view {
        grid-template-columns: 1fr;
      }

      .matrix-list .task-title {
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>작업 큐 탐색기</h1>
    <div class="subtle">루트처럼 이동 가능한 작업 구조 + 삭제/우선순위 + 드래그 넣기 + 위/아래 디렉토리 이동</div>

    <div class="workspace">

        </div>
        <div id="completed-date-section" class="date-section">

        </div>

        </div>
        <div id="folder-view-section" class="date-section">

        <div class="custom-tab-create" style="margin-top: 12px;">

        </div>

        </div>

        <div class="path-list-create custom-tab-create" style="margin-top: 12px;">
