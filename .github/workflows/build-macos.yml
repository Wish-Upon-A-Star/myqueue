name: Build Taskory macOS app

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: intel
          - runner: macos-latest
            arch: arm64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate project
        id: locate
        shell: bash
        run: |
          if [[ -f task_explorer_native.py ]]; then
            echo "project_dir=." >> "$GITHUB_OUTPUT"
          elif [[ -f myqueue/task_explorer_native.py ]]; then
            echo "project_dir=myqueue" >> "$GITHUB_OUTPUT"
          else
            echo "task_explorer_native.py not found" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build app package and verify launch path
        shell: bash
        run: |
          cd "${{ steps.locate.outputs.project_dir }}"
          chmod +x build_macos.sh scripts/install_macos_launcher_wrapper.sh
          ./build_macos.sh
          echo "=== zip entries ==="
          unzip -Z1 "dist/Taskory-macos-${{ matrix.arch }}.zip" | sed -n '1,80p'
          echo "=== launcher log ==="
          cat "$HOME/Library/Application Support/Taskory/Taskory-launcher.log" || true
          echo "=== boot log ==="
          cat "$HOME/Library/Application Support/Taskory/Taskory-boot.log" || true
        env:
          TASK_EXPLORER_ARCH: ${{ matrix.arch }}

      - name: Upload macOS package zip
        uses: actions/upload-artifact@v4
        with:
          name: Taskory-macos-${{ matrix.arch }}
          path: ${{ steps.locate.outputs.project_dir }}/dist/Taskory-macos-${{ matrix.arch }}.zip
